<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orbita — Comunidade</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23e8ff5a'/><text x='50' y='68' text-anchor='middle' font-size='55' fill='%23000'>✦</text></svg>"/>
  <style>
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,15,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }

    .nav-inner {
      max-width: 800px; margin: 0 auto;
      display: flex; align-items: center;
      height: 60px; gap: 16px;
    }

    .page {
      max-width: 800px; margin: 0 auto;
      padding: 0 24px 40px;
    }

    /* BANNER DA COMUNIDADE */
    .community-hero {
      height: 160px;
      display: flex; align-items: flex-end;
      padding: 24px;
      position: relative;
      margin: 0 -24px 0;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-content { display: flex; align-items: center; gap: 16px; }

    .hero-emoji {
      width: 72px; height: 72px; border-radius: 18px;
      background: rgba(0,0,0,0.3);
      border: 2px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; flex-shrink: 0;
    }

    .hero-info { flex: 1; }

    .hero-nome {
      font-family: var(--font-display); font-weight: 800;
      font-size: 1.6rem; letter-spacing: -0.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .hero-meta {
      font-size: 0.82rem; color: rgba(255,255,255,0.7);
      margin-top: 4px;
    }

    .hero-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .btn-hero {
      padding: 8px 18px; border-radius: 999px;
      font-size: 0.82rem; font-family: var(--font-body); font-weight: 500;
      cursor: pointer; transition: all 0.2s; border: none;
    }

    .btn-hero.primary { background: var(--accent); color: #000; }
    .btn-hero.primary:hover { box-shadow: 0 4px 16px rgba(232,255,90,0.3); }
    .btn-hero.outline {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
    }
    .btn-hero.outline:hover { background: rgba(255,255,255,0.2); }
    .btn-hero.danger {
      background: rgba(255,90,138,0.2);
      border: 1px solid rgba(255,90,138,0.3);
      color: var(--accent3);
    }

    /* INFO BAR */
    .info-bar {
      display: flex; align-items: center; gap: 24px;
      padding: 16px 0; border-bottom: 1px solid var(--border);
      margin-bottom: 24px; flex-wrap: wrap;
      animation: fadeUp 0.4s 0.05s ease both;
    }

    .info-item { font-size: 0.82rem; color: var(--muted); }
    .info-item strong { color: var(--text); font-weight: 600; }

    .info-desc {
      flex: 1; font-size: 0.85rem; color: var(--muted);
      line-height: 1.6; min-width: 200px;
    }

    /* LAYOUT */
    .feed-layout {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 24px; align-items: start;
    }

    /* FEED */
    .feed-col { display: flex; flex-direction: column; gap: 16px; }

    /* CAIXA DE POST */
    .post-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px;
      animation: fadeUp 0.4s 0.1s ease both;
    }

    .post-input-row { display: flex; gap: 12px; align-items: flex-start; }

    .post-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--surface2); border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }

    .post-textarea {
      flex: 1; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 11px 14px; color: var(--text);
      font-family: var(--font-body); font-size: 0.88rem;
      resize: none; outline: none; min-height: 72px;
      transition: border-color 0.2s, min-height 0.3s;
    }

    .post-textarea::placeholder { color: var(--muted); }
    .post-textarea:focus { border-color: var(--accent); min-height: 100px; }

    .post-bottom {
      display: flex; align-items: center;
      justify-content: flex-end; margin-top: 12px; gap: 12px;
    }

    .post-submit {
      padding: 8px 18px; background: var(--accent); color: #000;
      border: none; border-radius: 999px;
      font-family: var(--font-body); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }

    .post-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    /* POSTS */
    .post-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px;
      transition: border-color 0.2s; animation: fadeUp 0.4s ease both;
    }

    .post-card:hover { border-color: rgba(255,255,255,0.1); }

    .post-header { display: flex; align-items: center; gap: 11px; margin-bottom: 12px; }

    .post-user-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0; cursor: pointer;
    }

    .post-user-info { flex: 1; }

    .post-user-name {
      font-family: var(--font-display); font-weight: 600;
      font-size: 0.88rem; cursor: pointer;
    }

    .post-user-name:hover { color: var(--accent); }

    .post-time { font-size: 0.72rem; color: var(--muted); }
    .post-text { font-size: 0.88rem; line-height: 1.7; color: #d0d0d0; margin-bottom: 14px; white-space: pre-wrap; }

    .post-reactions {
      display: flex; gap: 4px;
      padding-top: 12px; border-top: 1px solid var(--border);
    }

    .reaction-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 11px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-size: 0.78rem;
      font-family: var(--font-body); cursor: pointer; transition: all 0.2s;
    }

    .reaction-btn:hover { background: var(--surface2); color: var(--text); }
    .reaction-btn.active { background: rgba(232,255,90,0.08); border-color: rgba(232,255,90,0.3); color: var(--accent); }

    /* EMPTY STATE */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 0.88rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    /* SIDEBAR DIREITA */
    .side-col {
      position: sticky; top: 80px;
      display: flex; flex-direction: column; gap: 16px;
    }

    .widget {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px;
      animation: fadeUp 0.4s ease both;
    }

    .widget-title {
      font-family: var(--font-display); font-weight: 700;
      font-size: 0.88rem; margin-bottom: 14px;
    }

    .member-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: opacity 0.2s;
    }

    .member-item:last-child { border-bottom: none; }
    .member-item:hover { opacity: 0.7; }

    .member-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; flex-shrink: 0;
    }

    .member-nome { font-size: 0.82rem; font-weight: 500; }
    .member-handle { font-size: 0.72rem; color: var(--muted); }

    @media (max-width: 700px) {
      .feed-layout { grid-template-columns: 1fr; }
      .side-col { display: none; }
    }

    .comments-section {
  display: none; margin-top: 14px;
  padding-top: 14px; border-top: 1px solid var(--border);
}

.comments-section.open { display: block; }

.comment-input-row {
  display: flex; gap: 10px;
  align-items: center; margin-bottom: 12px;
}

.comment-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; flex-shrink: 0;
}

.comment-input {
  flex: 1; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 999px;
  padding: 8px 14px; color: var(--text);
  font-family: var(--font-body); font-size: 0.82rem;
  outline: none; transition: border-color 0.2s;
}

.comment-input::placeholder { color: var(--muted); }
.comment-input:focus { border-color: var(--accent2); }

.comment-send {
  width: 30px; height: 30px; border-radius: 50%;
  border: none; background: var(--accent2); color: #000;
  font-size: 0.8rem; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}

.comment-send:hover { transform: scale(1.1); }

.comment-item {
  display: flex; gap: 10px; margin-bottom: 10px;
  animation: fadeUp 0.3s ease both;
}

.comment-body {
  flex: 1; background: var(--surface2);
  border-radius: 12px; padding: 9px 13px;
}

.comment-name {
  font-family: var(--font-display); font-size: 0.78rem;
  font-weight: 600; margin-bottom: 2px;
}

.comment-text { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }

.mobile-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(13,13,15,0.95);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  padding: 8px 0 16px;
  z-index: 100;
  justify-content: space-around;
  align-items: center;
}

.mobile-nav-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 16px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-size: 1.3rem;
  cursor: pointer;
  text-decoration: none;
  transition: color 0.2s;
  font-family: var(--font-body);
}

.mobile-nav-btn span {
  font-size: 0.6rem;
}

.mobile-nav-btn.active { color: var(--accent); }

@media (max-width: 768px) {
  .mobile-nav { display: flex; }
  nav { display: none; }
  .page, .chat-layout { padding-bottom: 80px; }
}

  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-dot"></span>
        Orbita
      </a>
      <div style="display:flex; gap:6px">
        <a href="feed.html"        class="nav-btn">🏠 Feed</a>
        <a href="comunidades.html" class="nav-btn active">🌐 Comunidades</a>
        <a href="buscar.html"      class="nav-btn">🔍 Buscar</a>
        <a href="perfil.html"      class="nav-btn">👤 Perfil</a>
      </div>
    </div>
  </nav>

  <!-- BANNER -->
  <div class="community-hero" id="community-hero">
    <div class="hero-content">
      <div class="hero-emoji" id="hero-emoji">🌐</div>
      <div class="hero-info">
        <div class="hero-nome"  id="hero-nome">Carregando...</div>
        <div class="hero-meta" id="hero-meta"></div>
      </div>
    </div>
    <div class="hero-actions" id="hero-actions"></div>
  </div>

  <div class="page">

    <!-- INFO BAR -->
    <div class="info-bar">
      <div class="info-item">👥 <strong id="info-membros">0</strong> membros</div>
      <div class="info-item">📝 <strong id="info-posts">0</strong> posts</div>
      <div class="info-item">🏷️ <strong id="info-categoria"></strong></div>
      <div class="info-desc" id="info-desc"></div>
    </div>

    <!-- LAYOUT FEED + SIDEBAR -->
    <div class="feed-layout">

      <!-- FEED -->
      <div class="feed-col">

        <!-- Caixa de post — só aparece se for membro -->
        <div class="post-box" id="post-box" style="display:none">
          <div class="post-input-row">
            <div class="post-avatar" id="post-avatar">🙂</div>
            <textarea
              class="post-textarea"
              id="post-input"
              placeholder="Compartilhe algo com a comunidade..."
              maxlength="280"
            ></textarea>
          </div>
          <div class="post-bottom">
            <button class="post-submit" id="btn-publicar"
                    onclick="publicarPost()" disabled>
              Publicar →
            </button>
          </div>
        </div>

        <!-- Posts -->
        <div id="posts-lista"></div>

      </div>

      <!-- SIDEBAR -->
      <aside class="side-col">
        <div class="widget">
          <div class="widget-title">👥 Membros recentes</div>
          <div id="membros-lista">
            <div class="skeleton-line"></div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line"></div>
          </div>
        </div>
      </aside>

    </div>
  </div>

  <script src="app.js"></script>
  <script>

    // Proteção de rota
    if (!Orbita.auth.estaLogado()) {
      window.location.href = 'login.html';
    }

    const token     = Orbita.store.ler('token');
    const euUsuario = Orbita.auth.usuario();

    // Pega o ID da comunidade da URL
    // Ex: comunidade.html?id=1
    const params       = new URLSearchParams(window.location.search);
    const comunidadeId = parseInt(params.get('id'));

    if (!comunidadeId) {
      window.location.href = 'comunidades.html';
    }

    let comunidade = null;

    // Cores por categoria
    const cores = {
      tecnologia: 'linear-gradient(135deg, #0a1a0a, #1a2a0a)',
      musica:     'linear-gradient(135deg, #0a0a1a, #1a0a2a)',
      games:      'linear-gradient(135deg, #1a1a0a, #2a1a0a)',
      esporte:    'linear-gradient(135deg, #0a1a0a, #0a2a0a)',
      arte:       'linear-gradient(135deg, #1a0a0a, #2a0a1a)',
      outro:      'linear-gradient(135deg, #1a1a1a, #2a2a2a)',
    };

    async function toggleComentarios(postId) {
  const section = document.getElementById('comments-' + postId);
  const aberto  = section.classList.contains('open');
  section.classList.toggle('open', !aberto);
  if (!aberto) {
    await carregarComentarios(postId);
    document.getElementById('cinput-' + postId).focus();
  }
}

async function carregarComentarios(postId) {
  const lista = document.getElementById('clist-' + postId);
  lista.innerHTML = '<div class="skeleton-line" style="margin-top:8px"></div>';
  try {
    const resposta = await fetch(`${API_URL}/api/posts/${postId}`);
    const dados    = await resposta.json();
    if (!resposta.ok || dados.comentarios.length === 0) { lista.innerHTML = ''; return; }
    lista.innerHTML = dados.comentarios.map(c => `
      <div class="comment-item">
        <div class="comment-avatar">${c.autor_avatar || '🙂'}</div>
        <div class="comment-body">
          <div class="comment-name">${c.autor_nome}</div>
          <div class="comment-text">${c.texto}</div>
        </div>
      </div>
    `).join('');
  } catch (e) { lista.innerHTML = ''; }
}

async function enviarComentario(postId) {
  const input = document.getElementById('cinput-' + postId);
  const texto = input.value.trim();
  if (!texto) return;
  try {
    const resposta = await fetch(`${API_URL}/api/posts/${postId}/comentarios`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body:    JSON.stringify({ texto }),
    });
    const dados = await resposta.json();
    if (!resposta.ok) return;
    const lista = document.getElementById('clist-' + postId);
    lista.insertAdjacentHTML('beforeend', `
      <div class="comment-item" style="animation: fadeUp 0.3s ease both">
        <div class="comment-avatar">${euUsuario?.avatar || '🙂'}</div>
        <div class="comment-body">
          <div class="comment-name">${euUsuario?.nome || 'Você'}</div>
          <div class="comment-text">${texto}</div>
        </div>
      </div>
    `);
    input.value = '';
    const count = document.getElementById('ccount-' + postId);
    if (count) count.textContent = parseInt(count.textContent) + 1;
  } catch (e) { Orbita.toast('Erro ao enviar comentário', 'error'); }
}

    // ==========================================
    // FUNÇÃO: carregarComunidade()
    // ==========================================
    async function carregarComunidade() {
      try {
        const resposta = await fetch(`${API_URL}/api/comunidades/${comunidadeId}`, {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
        });

        const dados = await resposta.json();
        if (!resposta.ok) {
          window.location.href = 'comunidades.html';
          return;
        }

        comunidade = dados.comunidade;
        renderizarComunidade(comunidade);
        carregarPosts();
        carregarMembros();

      } catch (e) {
        Orbita.toast('Erro ao carregar comunidade', 'error');
      }
    }


    // ==========================================
    // FUNÇÃO: renderizarComunidade(c)
    // ==========================================
    function renderizarComunidade(c) {
      const cor = cores[c.categoria] || cores.outro;

      // Banner
      document.getElementById('community-hero').style.background = cor;
      document.getElementById('hero-emoji').textContent = c.emoji;
      document.getElementById('hero-nome').textContent  = c.nome;
      document.getElementById('hero-meta').textContent  = `${c.total_membros} membros · ${c.categoria}`;

      // Botões do hero
      const actions = document.getElementById('hero-actions');
      actions.innerHTML = c.sou_membro ? `
        <button class="btn-hero danger" onclick="toggleMembro()">Sair</button>
      ` : `
        <button class="btn-hero primary" onclick="toggleMembro()">+ Entrar</button>
      `;

      // Info bar
      document.getElementById('info-membros').textContent  = c.total_membros;
      document.getElementById('info-categoria').textContent = c.categoria;
      document.getElementById('info-desc').textContent      = c.descricao || 'Sem descrição.';

      // Atualiza título
      document.title = `Orbita — ${c.nome}`;

      // Mostra caixa de post só para membros
      if (c.sou_membro) {
        document.getElementById('post-box').style.display  = 'block';
        document.getElementById('post-avatar').textContent = euUsuario?.avatar || '🙂';
      }
    }


    // ==========================================
    // FUNÇÃO: carregarPosts()
    // ==========================================
    async function carregarPosts() {
      const lista = document.getElementById('posts-lista');

      lista.innerHTML = [1,2,3].map(() => `
        <div class="post-card">
          <div style="display:flex;gap:12px;align-items:center;margin-bottom:14px">
            <div class="skeleton-circle" style="width:38px;height:38px"></div>
            <div style="flex:1">
              <div class="skeleton-line" style="width:40%"></div>
              <div class="skeleton-line" style="width:20%;margin-bottom:0"></div>
            </div>
          </div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line" style="width:75%;margin-bottom:0"></div>
        </div>
      `).join('');

      try {
        const resposta = await fetch(`${API_URL}/api/comunidades/${comunidadeId}/posts`);
        const dados    = await resposta.json();

        document.getElementById('info-posts').textContent = dados.posts.length;

        if (dados.posts.length === 0) {
          lista.innerHTML = `
            <div class="empty-state">
              <div style="font-size:2rem;margin-bottom:12px">📝</div>
              <p>Nenhum post ainda nessa comunidade.</p>
              ${comunidade?.sou_membro ? '<p style="margin-top:8px">Seja o primeiro a publicar!</p>' : ''}
            </div>
          `;
          return;
        }

        lista.innerHTML = '';
        dados.posts.forEach((post, i) => {
          const tempo = Orbita.format.tempo(new Date(post.criado_em));
          lista.insertAdjacentHTML('beforeend', `
            <div class="post-card" id="card-${post.id}" style="animation-delay:${i * 0.07}s">
              <div class="post-header">
                <div class="post-user-avatar"
                     onclick="window.location.href='perfil.html?usuario=${post.autor_handle}'">
                  ${post.autor_avatar || '🙂'}
                </div>
                <div class="post-user-info">
                  <div class="post-user-name"
                       onclick="window.location.href='perfil.html?usuario=${post.autor_handle}'">
                    ${post.autor_nome}
                  </div>
                  <div class="post-time">${tempo}</div>
                </div>
                ${post.autor_id === euUsuario?.id ? `
                  <button class="reaction-btn" onclick="deletarPost(${post.id})">🗑️</button>
                ` : ''}
              </div>
              <div class="post-text">${post.texto}</div>
              <div class="post-reactions">
                 <button class="reaction-btn" id="like-${post.id}" onclick="curtirPost(${post.id})">
                 ✦ <span id="count-${post.id}">${post.curtidas}</span>
                 </button>
                 <button class="reaction-btn" onclick="toggleComentarios(${post.id})">
                 💬 <span id="ccount-${post.id}">${post.comentarios}</span>
                 </button>
              </div>

            <!-- Seção de comentários -->
              <div class="comments-section" id="comments-${post.id}">
              <div class="comment-input-row">
              <div class="comment-avatar">${euUsuario?.avatar || '🙂'}</div>
                <input
                 class="comment-input"
                 type="text"
                 placeholder="Escreva um comentário..."
                 id="cinput-${post.id}"
                 onkeydown="if(event.key==='Enter') enviarComentario(${post.id})"
                />
                <button class="comment-send" onclick="enviarComentario(${post.id})">→</button>
              </div>
              <div id="clist-${post.id}"></div>
              </div>
            </div>
          `);
        });

      } catch (e) {
        lista.innerHTML = `<div class="empty-state">Erro ao carregar posts.</div>`;
      }
    }


    // ==========================================
    // FUNÇÃO: carregarMembros()
    // ==========================================
    async function carregarMembros() {
      const lista = document.getElementById('membros-lista');

      try {
        // Reutiliza a rota de seguidores buscando membros
        const resposta = await fetch(`${API_URL}/api/comunidades/${comunidadeId}`);
        const dados    = await resposta.json();

        // Mostra membros simulados por enquanto
        // (a rota de listar membros pode ser adicionada depois)
        lista.innerHTML = `
          <p style="font-size:0.82rem;color:var(--muted)">
            ${dados.comunidade.total_membros} membro${dados.comunidade.total_membros !== 1 ? 's' : ''} nessa comunidade.
          </p>
        `;

      } catch (e) {
        lista.innerHTML = '';
      }
    }


    // ==========================================
    // FUNÇÃO: toggleMembro()
    // ==========================================
    async function toggleMembro() {
      try {
        const resposta = await fetch(`${API_URL}/api/comunidades/${comunidadeId}/entrar`, {
          method:  'POST',
          headers: { 'Authorization': `Bearer ${token}` },
        });

        const dados = await resposta.json();
        if (!resposta.ok) { Orbita.toast(dados.erro || 'Erro', 'error'); return; }

        Orbita.toast(dados.membro ? 'Entrou na comunidade! 🎉' : 'Saiu da comunidade', 'default');

        // Recarrega a página para refletir o novo estado
        carregarComunidade();

      } catch (e) {
        Orbita.toast('Erro ao conectar', 'error');
      }
    }


    // ==========================================
    // FUNÇÃO: publicarPost()
    // ==========================================
    async function publicarPost() {
      const input = document.getElementById('post-input');
      const texto = input.value.trim();
      const btn   = document.getElementById('btn-publicar');

      if (!texto) return;

      btn.disabled    = true;
      btn.textContent = 'Publicando...';

      try {
        const resposta = await fetch(`${API_URL}/api/posts`, {
          method:  'POST',
          headers: {
            'Content-Type':  'application/json',
            'Authorization': `Bearer ${token}`,
          },
          // Envia o comunidade_id junto com o post
          body: JSON.stringify({ texto, comunidade_id: comunidadeId }),
        });

        const dados = await resposta.json();
        if (!resposta.ok) { Orbita.toast(dados.erro || 'Erro', 'error'); return; }

        input.value = '';
        Orbita.toast('Post publicado! ✦', 'success');
        carregarPosts();

      } catch (e) {
        Orbita.toast('Erro ao conectar', 'error');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Publicar →';
        btn.disabled    = true;
      }
    }


    // ==========================================
    // FUNÇÃO: curtirPost(id)
    // ==========================================
    async function curtirPost(id) {
      try {
        const resposta = await fetch(`${API_URL}/api/posts/${id}/curtir`, {
          method:  'POST',
          headers: { 'Authorization': `Bearer ${token}` },
        });

        const dados = await resposta.json();
        if (!resposta.ok) return;

        const btn   = document.getElementById('like-' + id);
        const count = document.getElementById('count-' + id);
        if (btn)   btn.classList.toggle('active', dados.curtido);
        if (count) count.textContent = dados.curtidas;

      } catch (e) {}
    }


    // ==========================================
    // FUNÇÃO: deletarPost(id)
    // ==========================================
    async function deletarPost(id) {
      if (!confirm('Deletar esse post?')) return;

      try {
        const resposta = await fetch(`${API_URL}/api/posts/${id}`, {
          method:  'DELETE',
          headers: { 'Authorization': `Bearer ${token}` },
        });

        if (!resposta.ok) { Orbita.toast('Erro ao deletar', 'error'); return; }

        const card = document.getElementById('card-' + id);
        card.style.opacity = '0'; card.style.transform = 'translateY(-8px)';
        card.style.transition = 'all 0.3s ease';
        setTimeout(() => card.remove(), 300);

        Orbita.toast('Post deletado', 'default');

      } catch (e) {}
    }


    // Habilita botão ao digitar
    document.getElementById('post-input').addEventListener('input', function() {
      document.getElementById('btn-publicar').disabled = this.value.trim().length === 0;
    });


    // Carrega tudo ao abrir
    carregarComunidade();

  </script>
