<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orbita — Comunidades</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,15,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }

    .nav-inner {
      max-width: 1000px; margin: 0 auto;
      display: flex; align-items: center;
      height: 60px; gap: 16px;
    }

    .nav-search {
      flex: 1; max-width: 300px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 16px; color: var(--text);
      font-family: var(--font-body); font-size: 0.85rem;
      outline: none; transition: border-color 0.2s;
    }

    .nav-search::placeholder { color: var(--muted); }
    .nav-search:focus { border-color: var(--accent); }

    .nav-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .page { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }

    /* HEADER */
    .page-header {
      display: flex; align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 16px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page-title {
      font-family: var(--font-display); font-size: 1.8rem;
      font-weight: 800; letter-spacing: -0.5px;
    }

    .page-sub { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }

    /* FILTROS */
    .filters {
      display: flex; gap: 8px; margin-bottom: 28px;
      flex-wrap: wrap; animation: fadeUp 0.4s 0.05s ease both;
    }

    .filter-btn {
      padding: 7px 16px; border-radius: 999px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-family: var(--font-body);
      font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
    }

    .filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    .filter-btn.active { background: var(--surface2); color: var(--text); border-color: rgba(255,255,255,0.2); }

    /* SEÇÃO */
    .section-label {
      font-size: 0.72rem; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 14px; font-weight: 500;
    }

    /* GRID */
    .communities-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px; margin-bottom: 40px;
    }

    /* CARD DE COMUNIDADE */
    .community-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      cursor: pointer; transition: border-color 0.2s, transform 0.2s;
      animation: fadeUp 0.4s ease both;
    }

    .community-card:hover {
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-3px);
    }

    .community-banner {
      height: 70px; display: flex; align-items: center;
      justify-content: center; font-size: 2rem; position: relative;
    }

    .member-badge {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(90,255,184,0.4);
      color: var(--accent2); font-size: 0.65rem;
      padding: 2px 8px; border-radius: 999px;
      font-family: var(--font-body);
    }

    .community-body { padding: 14px 16px 16px; }

    .community-name {
      font-family: var(--font-display); font-weight: 700;
      font-size: 0.95rem; margin-bottom: 4px;
    }

    .community-desc {
      font-size: 0.78rem; color: var(--muted); line-height: 1.5;
      margin-bottom: 12px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .community-meta {
      display: flex; align-items: center; justify-content: space-between;
    }

    .community-members { font-size: 0.75rem; color: var(--muted); }

    .btn-join {
      padding: 5px 14px; border-radius: 999px;
      font-size: 0.75rem; font-family: var(--font-body); font-weight: 500;
      cursor: pointer; transition: all 0.2s;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
    }

    .btn-join:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    .btn-join.member {
      background: rgba(90,255,184,0.1);
      border-color: rgba(90,255,184,0.3); color: var(--accent2);
    }

    .btn-join.member:hover {
      background: rgba(255,90,90,0.1);
      border-color: rgba(255,90,90,0.3); color: #ff7070;
    }

    /* ESTADO VAZIO */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 0.88rem;
      grid-column: 1 / -1;
    }

    /* MODAL: DETALHES */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }

    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; width: 100%; max-width: 560px;
      max-height: 90vh; overflow-y: auto;
      transform: translateY(20px) scale(0.97); transition: transform 0.25s;
    }

    .modal-overlay.open .modal { transform: translateY(0) scale(1); }

    .modal-banner {
      height: 120px; display: flex; align-items: center;
      justify-content: center; font-size: 3.5rem; position: relative;
    }

    .modal-close {
      position: absolute; top: 12px; right: 12px;
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(0,0,0,0.5); border: 1px solid var(--border);
      color: var(--text); font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }

    .modal-close:hover { background: rgba(255,255,255,0.1); }
    .modal-body { padding: 24px; }

    .modal-category { font-size: 0.78rem; color: var(--accent2); margin-bottom: 6px; letter-spacing: 0.5px; }
    .modal-name { font-family: var(--font-display); font-weight: 800; font-size: 1.4rem; letter-spacing: -0.5px; margin-bottom: 10px; }
    .modal-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.7; margin-bottom: 20px; }

    .modal-stats {
      display: flex; gap: 20px; margin-bottom: 20px;
      padding: 16px; background: var(--surface2); border-radius: 12px;
    }

    .modal-stat { text-align: center; flex: 1; }
    .modal-stat-num { font-family: var(--font-display); font-weight: 700; font-size: 1.2rem; }
    .modal-stat-label { font-size: 0.72rem; color: var(--muted); }

    /* Posts no modal */
    .modal-posts-title { font-family: var(--font-display); font-weight: 600; font-size: 0.85rem; margin-bottom: 12px; color: var(--muted); }

    .modal-post-item {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }

    .modal-post-item:last-child { border-bottom: none; }

    .modal-post-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--surface2); display: flex;
      align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0;
    }

    .modal-post-name { font-weight: 500; color: var(--text); font-size: 0.82rem; }
    .modal-post-text { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }

    .btn-join-modal {
      width: 100%; padding: 13px; border-radius: 12px;
      font-family: var(--font-body); font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; border: none; margin-top: 20px;
    }

    .btn-join-modal.join { background: var(--accent); color: #000; }
    .btn-join-modal.join:hover { box-shadow: 0 8px 24px rgba(232,255,90,0.2); }
    .btn-join-modal.leave { background: var(--surface2); color: var(--accent3); border: 1px solid rgba(255,90,138,0.2); }

    /* MODAL: CRIAR */
    .create-title { font-family: var(--font-display); font-weight: 800; font-size: 1.2rem; margin-bottom: 24px; }

    .emoji-picker { display: flex; gap: 8px; flex-wrap: wrap; }

    .emoji-option {
      width: 40px; height: 40px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--surface2);
      font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }

    .emoji-option:hover { border-color: var(--accent); transform: scale(1.1); }
    .emoji-option.selected { border-color: var(--accent); background: rgba(232,255,90,0.1); }

    .form-actions { display: flex; gap: 10px; margin-top: 24px; }

    .btn-cancel {
      flex: 1; padding: 12px; border-radius: 10px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-family: var(--font-body);
      font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
    }

    .btn-cancel:hover { color: var(--text); }

    .btn-create {
      flex: 2; padding: 12px; border-radius: 10px;
      border: none; background: var(--accent); color: #000;
      font-family: var(--font-body); font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }

    .btn-create:hover { box-shadow: 0 4px 16px rgba(232,255,90,0.2); }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-dot"></span>
        Orbita
      </a>
      <input class="nav-search" type="text" placeholder="🔍 Buscar comunidades..."
             oninput="filtrarBusca(this.value)"/>
      <div class="nav-actions">
        <a href="feed.html"   class="nav-btn">🏠 Feed</a>
        <a href="buscar.html" class="nav-btn">🔍 Buscar</a>
        <a href="perfil.html" class="nav-btn">👤 Perfil</a>
      </div>
    </div>
  </nav>

  <div class="page">

    <div class="page-header">
      <div>
        <div class="page-title">Comunidades</div>
        <div class="page-sub">Encontre seu povo — entre em grupos do seu interesse</div>
      </div>
      <button class="btn btn-primary" onclick="abrirModalCriar()">+ Nova comunidade</button>
    </div>

    <!-- Filtros -->
    <div class="filters">
      <button class="filter-btn active" onclick="filtrarCategoria('todos', this)">Todos</button>
      <button class="filter-btn" onclick="filtrarCategoria('tecnologia', this)">💻 Tecnologia</button>
      <button class="filter-btn" onclick="filtrarCategoria('musica', this)">🎵 Música</button>
      <button class="filter-btn" onclick="filtrarCategoria('games', this)">🎮 Games</button>
      <button class="filter-btn" onclick="filtrarCategoria('esporte', this)">⚽ Esporte</button>
      <button class="filter-btn" onclick="filtrarCategoria('arte', this)">🎨 Arte</button>
    </div>

    <!-- Minhas comunidades -->
    <div id="secao-minhas" style="display:none">
      <div class="section-label">Minhas comunidades</div>
      <div class="communities-grid" id="grid-minhas"></div>
    </div>

    <!-- Descobrir -->
    <div class="section-label">Descobrir</div>
    <div class="communities-grid" id="grid-descobrir"></div>

  </div>


  <!-- MODAL: DETALHES -->
  <div class="modal-overlay" id="modal-detalhe" onclick="fecharSeOverlay(event, 'modal-detalhe')">
    <div class="modal">
      <div class="modal-banner" id="modal-banner">
        <button class="modal-close" onclick="fecharModal('modal-detalhe')">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-category" id="modal-cat"></div>
        <div class="modal-name"     id="modal-nome"></div>
        <div class="modal-desc"     id="modal-desc"></div>
        <div class="modal-stats">
          <div class="modal-stat">
            <div class="modal-stat-num"   id="modal-membros"></div>
            <div class="modal-stat-label">Membros</div>
          </div>
          <div class="modal-stat">
            <div class="modal-stat-num"   id="modal-posts-count">0</div>
            <div class="modal-stat-label">Posts</div>
          </div>
        </div>
        <div class="modal-posts-title">Posts recentes</div>
        <div id="modal-posts-lista"></div>
        <button class="btn-join-modal" id="btn-join-modal"></button>
        <a id="btn-ver-feed"
        class="btn btn-secondary"
        style="display:none; text-align:center; margin-top:10px; width:100%; padding:12px; border-radius:12px">
        Ver feed da comunidade →
        </a>
      </div>
    </div>
  </div>


  <!-- MODAL: CRIAR -->
  <div class="modal-overlay" id="modal-criar" onclick="fecharSeOverlay(event, 'modal-criar')">
    <div class="modal">
      <div class="modal-body">
        <button class="modal-close" style="position:static;float:right;margin-bottom:8px"
                onclick="fecharModal('modal-criar')">✕</button>
        <div class="create-title">✦ Nova comunidade</div>

        <div class="field">
          <label>Ícone</label>
          <div class="emoji-picker" id="emoji-picker">
            <div class="emoji-option selected" onclick="selecionarEmoji(this, '💻')">💻</div>
            <div class="emoji-option" onclick="selecionarEmoji(this, '🎵')">🎵</div>
            <div class="emoji-option" onclick="selecionarEmoji(this, '🎮')">🎮</div>
            <div class="emoji-option" onclick="selecionarEmoji(this, '⚽')">⚽</div>
            <div class="emoji-option" onclick="selecionarEmoji(this, '🎨')">🎨</div>
            <div class="emoji-option" onclick="selecionarEmoji(this, '📚')">📚</div>
            <div class="emoji-option" onclick="selecionarEmoji(this, '🍕')">🍕</div>
            <div class="emoji-option" onclick="selecionarEmoji(this, '✈️')">✈️</div>
          </div>
        </div>

        <div class="field">
          <label for="criar-nome">Nome</label>
          <input type="text" id="criar-nome" placeholder="Ex: Devs BR, Amantes de Jazz..."/>
          <div class="field-error" id="err-criar-nome">Nome obrigatório</div>
        </div>

        <div class="field">
          <label for="criar-desc">Descrição</label>
          <textarea id="criar-desc" placeholder="Sobre o que é essa comunidade?" style="min-height:80px;resize:none"></textarea>
        </div>

        <div class="field">
          <label for="criar-cat">Categoria</label>
          <select id="criar-cat">
            <option value="tecnologia">💻 Tecnologia</option>
            <option value="musica">🎵 Música</option>
            <option value="games">🎮 Games</option>
            <option value="esporte">⚽ Esporte</option>
            <option value="arte">🎨 Arte</option>
            <option value="outro">🌐 Outro</option>
          </select>
        </div>

        <div class="form-actions">
          <button class="btn-cancel" onclick="fecharModal('modal-criar')">Cancelar</button>
          <button class="btn-create" onclick="criarComunidade()">Criar comunidade →</button>
        </div>
      </div>
    </div>
  </div>


  <script src="app.js"></script>
  <script>

    // Proteção de rota
    if (!Orbita.auth.estaLogado()) {
      window.location.href = 'login.html';
    }

    const token         = Orbita.store.ler('token');
    let   emojiSel      = '💻';
    let   categoriaAtiva = 'todos';
    let   comunidadeAtual = null;
    let   todasComunidades = [];


    // ==========================================
    // FUNÇÃO: carregarComunidades(busca)
    // ==========================================
    async function carregarComunidades(busca = '', categoria = 'todos') {
      const gridMinhas    = document.getElementById('grid-minhas');
      const gridDescobrr  = document.getElementById('grid-descobrir');
      const secaoMinhas   = document.getElementById('secao-minhas');

      // Esqueletos
      gridDescobrr.innerHTML = [1,2,3,4].map(() => `
        <div class="community-card" style="cursor:default">
          <div style="height:70px;background:var(--surface2)"></div>
          <div class="community-body">
            <div class="skeleton-line" style="width:60%"></div>
            <div class="skeleton-line" style="width:90%"></div>
            <div class="skeleton-line" style="width:40%;margin-bottom:0"></div>
          </div>
        </div>
      `).join('');

      try {
        let url = `${API_URL}/api/comunidades?`;
        if (busca.length >= 2) url += `busca=${encodeURIComponent(busca)}&`;
        if (categoria !== 'todos') url += `categoria=${categoria}`;

        const resposta = await fetch(url, {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
        });

        const dados = await resposta.json();
        todasComunidades = dados.comunidades;

        const minhas    = todasComunidades.filter(c => c.sou_membro);
        const descobrir = todasComunidades.filter(c => !c.sou_membro);

        // Minhas comunidades
        if (minhas.length > 0) {
          secaoMinhas.style.display = 'block';
          gridMinhas.innerHTML = minhas.map((c, i) => criarCard(c, i)).join('');
        } else {
          secaoMinhas.style.display = 'none';
        }

        // Descobrir
        if (descobrir.length === 0) {
          gridDescobrr.innerHTML = `
            <div class="empty-state">
              <div style="font-size:2rem;margin-bottom:12px">🌌</div>
              <p>Nenhuma comunidade encontrada.</p>
              <p style="margin-top:8px">Que tal criar a primeira?</p>
            </div>
          `;
        } else {
          gridDescobrr.innerHTML = descobrir.map((c, i) => criarCard(c, i)).join('');
        }

      } catch (e) {
        gridDescobrr.innerHTML = `<div class="empty-state">Erro ao carregar comunidades.</div>`;
      }
    }


    // ==========================================
    // FUNÇÃO: criarCard(c, index)
    // ==========================================
    function criarCard(c, index) {
      const cores = {
        tecnologia: 'linear-gradient(135deg, #0a1a0a, #1a2a0a)',
        musica:     'linear-gradient(135deg, #0a0a1a, #1a0a2a)',
        games:      'linear-gradient(135deg, #1a1a0a, #2a1a0a)',
        esporte:    'linear-gradient(135deg, #0a1a0a, #0a2a0a)',
        arte:       'linear-gradient(135deg, #1a0a0a, #2a0a1a)',
        outro:      'linear-gradient(135deg, #1a1a1a, #2a2a2a)',
      };

      const cor = cores[c.categoria] || cores.outro;

      return `
        <div class="community-card" style="animation-delay:${index * 0.06}s"
             onclick="abrirModalDetalhe(${c.id})">
          <div class="community-banner" style="background:${cor}">
            ${c.emoji}
            ${c.sou_membro ? '<span class="member-badge">✓ membro</span>' : ''}
          </div>
          <div class="community-body">
            <div class="community-name">${c.nome}</div>
            <div class="community-desc">${c.descricao || 'Sem descrição.'}</div>
            <div class="community-meta">
              <div class="community-members">👥 ${Orbita.format.numero(parseInt(c.total_membros))}</div>
              <button
                class="btn-join ${c.sou_membro ? 'member' : ''}"
                id="join-${c.id}"
                onclick="event.stopPropagation(); toggleMembro(${c.id})">
                ${c.sou_membro ? 'Membro' : 'Entrar'}
              </button>
            </div>
          </div>
        </div>
      `;
    }


    // ==========================================
    // FUNÇÃO: toggleMembro(id)
    // ==========================================
    async function toggleMembro(id) {
      const btn = document.getElementById('join-' + id);
      if (btn) btn.disabled = true;

      try {
        const resposta = await fetch(`${API_URL}/api/comunidades/${id}/entrar`, {
          method:  'POST',
          headers: { 'Authorization': `Bearer ${token}` },
        });

        const dados = await resposta.json();
        if (!resposta.ok) { Orbita.toast(dados.erro || 'Erro', 'error'); return; }

        Orbita.toast(dados.membro ? 'Entrou na comunidade! 🎉' : 'Saiu da comunidade', 'default');

        // Recarrega os cards
        carregarComunidades('', categoriaAtiva);

        // Atualiza o modal se estiver aberto
        if (comunidadeAtual?.id === id) {
          const btnModal = document.getElementById('btn-join-modal');
          btnModal.textContent = dados.membro ? 'Sair da comunidade' : '✦ Entrar na comunidade';
          btnModal.className   = `btn-join-modal ${dados.membro ? 'leave' : 'join'}`;
          document.getElementById('modal-membros').textContent = dados.totalMembros;
        }

      } catch (e) {
        Orbita.toast('Erro ao conectar', 'error');
      } finally {
        if (btn) btn.disabled = false;
      }
    }


    // ==========================================
    // FUNÇÃO: abrirModalDetalhe(id)
    // ==========================================
    async function abrirModalDetalhe(id) {
      document.getElementById('modal-detalhe').classList.add('open');

      const cores = {
        tecnologia: 'linear-gradient(135deg, #0a1a0a, #1a2a0a)',
        musica:     'linear-gradient(135deg, #0a0a1a, #1a0a2a)',
        games:      'linear-gradient(135deg, #1a1a0a, #2a1a0a)',
        esporte:    'linear-gradient(135deg, #0a1a0a, #0a2a0a)',
        arte:       'linear-gradient(135deg, #1a0a0a, #2a0a1a)',
        outro:      'linear-gradient(135deg, #1a1a1a, #2a2a2a)',
      };

      try {
        const resposta = await fetch(`${API_URL}/api/comunidades/${id}`, {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
        });

        const dados = await resposta.json();
        if (!resposta.ok) return;

        const c = dados.comunidade;
        comunidadeAtual = c;

        // Preenche o modal
        const banner = document.getElementById('modal-banner');
        banner.style.background = cores[c.categoria] || cores.outro;
        banner.childNodes[0].textContent = c.emoji + ' ';

        document.getElementById('modal-cat').textContent     = c.categoria?.toUpperCase();
        document.getElementById('modal-nome').textContent    = c.nome;
        document.getElementById('modal-desc').textContent    = c.descricao || 'Sem descrição.';
        document.getElementById('modal-membros').textContent = c.total_membros;

        // Botão entrar/sair
        const btn = document.getElementById('btn-join-modal');
        btn.textContent = c.sou_membro ? 'Sair da comunidade' : '✦ Entrar na comunidade';
        btn.className   = `btn-join-modal ${c.sou_membro ? 'leave' : 'join'}`;
        btn.onclick     = () => toggleMembro(c.id);

        // Botão para ver o feed da comunidade
       document.getElementById('btn-ver-feed').style.display = 'block';
       document.getElementById('btn-ver-feed').onclick = () => {
       window.location.href = `comunidade.html?id=${c.id}`;
       };

        // Carrega posts da comunidade
        carregarPostsModal(id);

      } catch (e) {
        Orbita.toast('Erro ao carregar comunidade', 'error');
      }
    }


    // ==========================================
    // FUNÇÃO: carregarPostsModal(id)
    // ==========================================
    async function carregarPostsModal(id) {
      const lista = document.getElementById('modal-posts-lista');
      lista.innerHTML = '<div class="skeleton-line"></div>';

      try {
        const resposta = await fetch(`${API_URL}/api/comunidades/${id}/posts`);
        const dados    = await resposta.json();

        document.getElementById('modal-posts-count').textContent = dados.posts.length;

        if (dados.posts.length === 0) {
          lista.innerHTML = '<p style="color:var(--muted);font-size:0.82rem;padding:8px 0">Nenhum post ainda.</p>';
          return;
        }

        lista.innerHTML = dados.posts.slice(0, 3).map(p => `
          <div class="modal-post-item">
            <div class="modal-post-avatar">${p.autor_avatar || '🙂'}</div>
            <div>
              <div class="modal-post-name">${p.autor_nome}</div>
              <div class="modal-post-text">${p.texto.substring(0, 100)}${p.texto.length > 100 ? '...' : ''}</div>
            </div>
          </div>
        `).join('');

      } catch (e) {
        lista.innerHTML = '';
      }
    }


    // ==========================================
    // CRIAR COMUNIDADE
    // ==========================================
    function abrirModalCriar() {
      document.getElementById('modal-criar').classList.add('open');
    }

    function selecionarEmoji(el, emoji) {
      document.querySelectorAll('.emoji-option').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      emojiSel = emoji;
    }

    async function criarComunidade() {
      const nome = document.getElementById('criar-nome').value.trim();
      const desc = document.getElementById('criar-desc').value.trim();
      const cat  = document.getElementById('criar-cat').value;

      if (nome.length === 0) {
        document.getElementById('criar-nome').classList.add('error');
        document.getElementById('err-criar-nome').classList.add('visible');
        return;
      }

      try {
        const resposta = await fetch(`${API_URL}/api/comunidades`, {
          method:  'POST',
          headers: {
            'Content-Type':  'application/json',
            'Authorization': `Bearer ${token}`,
          },
          body: JSON.stringify({ nome, descricao: desc, emoji: emojiSel, categoria: cat }),
        });

        const dados = await resposta.json();
        if (!resposta.ok) { Orbita.toast(dados.erro || 'Erro', 'error'); return; }

        fecharModal('modal-criar');
        document.getElementById('criar-nome').value = '';
        document.getElementById('criar-desc').value = '';

        Orbita.toast('Comunidade criada! 🎉', 'success');
        carregarComunidades('', categoriaAtiva);

      } catch (e) {
        Orbita.toast('Erro ao conectar', 'error');
      }
    }


    // ==========================================
    // FILTROS
    // ==========================================
    const filtrarBuscaDebounced = Orbita.debounce((valor) => {
      carregarComunidades(valor, categoriaAtiva);
    }, 400);

    function filtrarBusca(valor) { filtrarBuscaDebounced(valor); }

    function filtrarCategoria(cat, btn) {
      categoriaAtiva = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      carregarComunidades('', cat);
    }


    // ==========================================
    // MODAIS
    // ==========================================
    function fecharModal(id) {
      document.getElementById(id).classList.remove('open');
      if (id === 'modal-detalhe') comunidadeAtual = null;
    }

    function fecharSeOverlay(e, id) {
      if (e.target.classList.contains('modal-overlay')) fecharModal(id);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        fecharModal('modal-detalhe');
        fecharModal('modal-criar');
      }
    });


    // Carrega ao abrir
    carregarComunidades();

  </script>
</body>
</html>
