<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orbita — Mensagens</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <!-- Socket.io client — carregado do CDN -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <!-- Favicon com emoji -->
   <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>"/>
   <meta name="theme-color" content="#0d0d0f"/>

  <style>
    body { overflow: hidden; } /* evita scroll na página inteira */

    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,15,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }

    .nav-inner {
      max-width: 1000px; margin: 0 auto;
      display: flex; align-items: center;
      height: 60px; gap: 16px;
    }

    /* LAYOUT: lista de conversas + chat */
    .chat-layout {
      max-width: 1000px; margin: 0 auto;
      display: grid;
      grid-template-columns: 300px 1fr;
      height: calc(100vh - 60px); /* ocupa o resto da tela */
    }

    /* ==========================================
       COLUNA ESQUERDA — lista de conversas
    ========================================== */
    .conversations-col {
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .conv-header {
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .conv-title {
      font-family: var(--font-display); font-weight: 700;
      font-size: 1rem; margin-bottom: 12px;
    }

    .conv-search {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 9px 14px; color: var(--text);
      font-family: var(--font-body); font-size: 0.85rem;
      outline: none; transition: border-color 0.2s;
    }

    .conv-search::placeholder { color: var(--muted); }
    .conv-search:focus { border-color: var(--accent); }

    .conv-list {
      flex: 1; overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .conv-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; cursor: pointer;
      transition: background 0.2s; border-bottom: 1px solid var(--border);
      position: relative;
    }

    .conv-item:hover { background: var(--surface); }
    .conv-item.active { background: var(--surface); }

    .conv-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0; position: relative;
    }

    .conv-online {
      position: absolute; bottom: 1px; right: 1px;
      width: 11px; height: 11px; border-radius: 50%;
      background: var(--accent2); border: 2px solid var(--bg);
    }

    .conv-info { flex: 1; min-width: 0; }

    .conv-nome {
      font-family: var(--font-display); font-weight: 600;
      font-size: 0.88rem; margin-bottom: 2px;
    }

    .conv-preview {
      font-size: 0.78rem; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .conv-time { font-size: 0.68rem; color: var(--muted); flex-shrink: 0; }

    .conv-badge {
      position: absolute; top: 12px; right: 16px;
      min-width: 18px; height: 18px; border-radius: 999px;
      background: var(--accent3); color: #fff;
      font-size: 0.65rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      padding: 0 4px;
    }

    .btn-nova-conversa {
      margin: 14px 20px;
      width: calc(100% - 40px);
      padding: 10px; border-radius: 10px;
      background: var(--accent); color: #000;
      border: none; font-family: var(--font-body);
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; flex-shrink: 0;
    }

    .btn-nova-conversa:hover { box-shadow: 0 4px 16px rgba(232,255,90,0.2); }

    /* ==========================================
       COLUNA DIREITA — chat
    ========================================== */
    .chat-col {
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* Estado inicial — nenhuma conversa selecionada */
    .chat-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--muted); text-align: center; padding: 40px;
    }

    .chat-empty-icon { font-size: 3rem; margin-bottom: 16px; }
    .chat-empty-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; color: var(--text); }
    .chat-empty-sub { font-size: 0.85rem; }

    /* Header do chat */
    .chat-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-header-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; cursor: pointer;
    }

    .chat-header-nome {
      font-family: var(--font-display); font-weight: 700;
      font-size: 0.95rem; cursor: pointer;
    }

    .chat-header-nome:hover { color: var(--accent); }
    .chat-header-status { font-size: 0.75rem; color: var(--accent2); }

    /* Mensagens */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .msg-group {
      display: flex; flex-direction: column; gap: 4px;
      animation: fadeUp 0.2s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-bubble {
      max-width: 70%; padding: 10px 14px;
      border-radius: 16px; font-size: 0.88rem;
      line-height: 1.5; word-break: break-word;
    }

    /* Mensagem recebida — alinhada à esquerda */
    .msg-received {
      align-self: flex-start;
      background: var(--surface2);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    /* Mensagem enviada — alinhada à direita */
    .msg-sent {
      align-self: flex-end;
      background: var(--accent);
      color: #000;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: 0.65rem; color: var(--muted);
      padding: 0 4px;
    }

    .msg-time.sent  { text-align: right; }
    .msg-time.received { text-align: left; }

    /* Separador de data */
    .date-separator {
      text-align: center; font-size: 0.72rem;
      color: var(--muted); margin: 8px 0;
      display: flex; align-items: center; gap: 12px;
    }

    .date-separator::before,
    .date-separator::after {
      content: ''; flex: 1; height: 1px;
      background: var(--border);
    }

    /* Input de mensagem */
    .chat-input-area {
      padding: 14px 20px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0;
    }

    .chat-textarea {
      flex: 1; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 14px;
      padding: 10px 14px; color: var(--text);
      font-family: var(--font-body); font-size: 0.88rem;
      resize: none; outline: none; min-height: 42px;
      max-height: 120px; transition: border-color 0.2s;
      line-height: 1.5;
    }

    .chat-textarea::placeholder { color: var(--muted); }
    .chat-textarea:focus { border-color: var(--accent); }

    .btn-send {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--accent); color: #000;
      border: none; font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
    }

    .btn-send:hover { transform: scale(1.08); box-shadow: 0 4px 16px rgba(232,255,90,0.3); }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* MODAL: nova conversa */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }

    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; width: 100%; max-width: 440px;
      transform: translateY(20px) scale(0.97); transition: transform 0.25s;
    }

    .modal-overlay.open .modal { transform: translateY(0) scale(1); }

    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }

    .modal-title { font-family: var(--font-display); font-weight: 700; font-size: 1rem; }

    .modal-close {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 20px; }

    .user-result {
      display: flex; align-items: center; gap: 12px;
      padding: 10px; border-radius: 10px; cursor: pointer;
      transition: background 0.2s;
    }

    .user-result:hover { background: var(--surface2); }

    .user-result-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--surface2); display: flex;
      align-items: center; justify-content: center; font-size: 1rem;
    }

    .user-result-nome { font-family: var(--font-display); font-weight: 600; font-size: 0.88rem; }
    .user-result-handle { font-size: 0.75rem; color: var(--muted); }

    @media (max-width: 700px) {
      .chat-layout { grid-template-columns: 1fr; }
      .conversations-col { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-dot"></span>
        Orbita
      </a>
      <div style="display:flex; gap:6px; flex:1; justify-content:center">
        <a href="feed.html"        class="nav-btn">🏠 Feed</a>
        <a href="buscar.html"      class="nav-btn">🔍 Buscar</a>
        <a href="comunidades.html" class="nav-btn">🌐 Comunidades</a>
        <a href="perfil.html"      class="nav-btn">👤 Perfil</a>
      </div>
    </div>
  </nav>

  <div class="chat-layout">

    <!-- LISTA DE CONVERSAS -->
    <div class="conversations-col">
      <div class="conv-header">
        <div class="conv-title">💬 Mensagens</div>
        <input class="conv-search" type="text"
               placeholder="Buscar conversa..."
               oninput="filtrarConversas(this.value)"/>
      </div>

      <button class="btn-nova-conversa" onclick="abrirModalNova()">
        + Nova mensagem
      </button>

      <div class="conv-list" id="conv-list"></div>
    </div>

    <!-- ÁREA DO CHAT -->
    <div class="chat-col" id="chat-col">
      <div class="chat-empty" id="chat-empty">
        <div class="chat-empty-icon">💬</div>
        <div class="chat-empty-title">Suas mensagens</div>
        <div class="chat-empty-sub">
          Selecione uma conversa ou inicie uma nova
        </div>
      </div>
    </div>

  </div>

  <!-- MODAL: NOVA CONVERSA -->
  <div class="modal-overlay" id="modal-nova" onclick="fecharSeOverlay(event)">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Nova mensagem</div>
        <button class="modal-close" onclick="fecharModal()">✕</button>
      </div>
      <div class="modal-body">
        <input
          class="conv-search"
          type="text"
          placeholder="Buscar usuário..."
          oninput="buscarUsuarioModal(this.value)"
          style="margin-bottom:14px"
        />
        <div id="modal-resultados"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>

    // Proteção de rota
    if (!Orbita.auth.estaLogado()) {
      window.location.href = 'login.html';
    }

    const token     = Orbita.store.ler('token');
    const euUsuario = Orbita.auth.usuario();

    let conversaAtiva    = null; // usuário da conversa aberta
    let todasConversas   = [];
    let socket           = null;


    // ==========================================
    // SOCKET.IO — conexão em tempo real
    // ==========================================
    function conectarSocket() {
      socket = io(API_URL, {
        transports: ['websocket', 'polling'],
      });

      socket.on('connect', () => {
        // Identifica o usuário para receber mensagens
        socket.emit('identificar', euUsuario.id);
      });

      // Recebe nova mensagem em tempo real
      socket.on('nova_mensagem', (msg) => {
        // Se a conversa com esse remetente está aberta, exibe
        if (conversaAtiva && msg.remetente_id === conversaAtiva.id) {
          adicionarMensagemNaTela(msg, false);
          marcarComoLida(conversaAtiva.id);
        } else {
          // Mostra notificação e atualiza a lista
          Orbita.toast(`💬 ${msg.remetente_nome}: ${msg.texto.substring(0, 40)}...`);
          carregarConversas();
        }
      });
    }


    // ==========================================
    // FUNÇÃO: carregarConversas()
    // ==========================================
    async function carregarConversas() {
      const lista = document.getElementById('conv-list');

      try {
        const resposta = await fetch(`${API_URL}/api/mensagens/conversas`, {
          headers: { 'Authorization': `Bearer ${token}` },
        });

        const dados = await resposta.json();
        todasConversas = dados.conversas || [];
        renderizarConversas(todasConversas);

      } catch (e) {
        lista.innerHTML = '<p style="padding:20px;color:var(--muted);font-size:0.85rem">Erro ao carregar.</p>';
      }
    }


    // ==========================================
    // FUNÇÃO: renderizarConversas(lista)
    // ==========================================
    function renderizarConversas(conversas) {
      const lista = document.getElementById('conv-list');

      if (conversas.length === 0) {
        lista.innerHTML = `
          <div style="padding:30px 20px;text-align:center;color:var(--muted);font-size:0.85rem">
            <div style="font-size:1.8rem;margin-bottom:10px">💬</div>
            <p>Nenhuma conversa ainda.</p>
          </div>
        `;
        return;
      }

      lista.innerHTML = conversas.map(c => `
        <div class="conv-item ${conversaAtiva?.id === c.outro_id ? 'active' : ''}"
             onclick="abrirConversa(${c.outro_id}, '${c.outro_nome}', '${c.outro_handle}', '${c.outro_avatar || '🙂'}')">
          <div class="conv-avatar">
            ${c.outro_avatar || '🙂'}
          </div>
          <div class="conv-info">
            <div class="conv-nome">${c.outro_nome}</div>
            <div class="conv-preview">
              ${c.remetente_id === euUsuario.id ? 'Você: ' : ''}${c.texto}
            </div>
          </div>
          <div class="conv-time">${Orbita.format.tempo(new Date(c.criado_em))}</div>
          ${c.nao_lidas > 0 ? `<div class="conv-badge">${c.nao_lidas}</div>` : ''}
        </div>
      `).join('');
    }


    // ==========================================
    // FUNÇÃO: abrirConversa(id, nome, handle, avatar)
    // ==========================================
    async function abrirConversa(id, nome, handle, avatar) {
      conversaAtiva = { id, nome, handle, avatar };

      // Atualiza item ativo na lista
      document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
      event?.currentTarget?.classList.add('active');

      // Monta a área do chat
      const chatCol = document.getElementById('chat-col');
      chatCol.innerHTML = `
        <!-- Header -->
        <div class="chat-header">
          <div class="chat-header-avatar" onclick="window.location.href='perfil.html?usuario=${handle}'">
            ${avatar}
          </div>
          <div style="flex:1">
            <div class="chat-header-nome" onclick="window.location.href='perfil.html?usuario=${handle}'">
              ${nome}
            </div>
            <div class="chat-header-status">@${handle}</div>
          </div>
        </div>

        <!-- Mensagens -->
        <div class="chat-messages" id="chat-messages">
          <div style="text-align:center;padding:20px">
            <div class="skeleton-line" style="width:40%;margin:0 auto 8px"></div>
            <div class="skeleton-line" style="width:60%;margin:0 auto"></div>
          </div>
        </div>

        <!-- Input -->
        <div class="chat-input-area">
          <textarea
            class="chat-textarea"
            id="chat-input"
            placeholder="Mensagem..."
            onkeydown="teclaEnter(event)"
            oninput="autoResize(this)"
            rows="1"
          ></textarea>
          <button class="btn-send" id="btn-send" onclick="enviarMensagem()">→</button>
        </div>
      `;

      // Carrega o histórico
      await carregarMensagens(id);

      // Marca como lida
      marcarComoLida(id);

      // Atualiza a lista (remove badge)
      carregarConversas();
    }


    // ==========================================
    // FUNÇÃO: carregarMensagens(usuarioId)
    // ==========================================
    async function carregarMensagens(usuarioId) {
      const area = document.getElementById('chat-messages');
      if (!area) return;

      try {
        const resposta = await fetch(`${API_URL}/api/mensagens/${usuarioId}`, {
          headers: { 'Authorization': `Bearer ${token}` },
        });

        const dados = await resposta.json();
        area.innerHTML = '';

        if (dados.mensagens.length === 0) {
          area.innerHTML = `
            <div style="text-align:center;padding:40px;color:var(--muted);font-size:0.85rem">
              <p>Nenhuma mensagem ainda.</p>
              <p style="margin-top:8px">Diga olá! 👋</p>
            </div>
          `;
          return;
        }

        dados.mensagens.forEach(msg => adicionarMensagemNaTela(msg, false));

        // Rola para o final
        area.scrollTop = area.scrollHeight;

      } catch (e) {
        if (area) area.innerHTML = '<p style="padding:20px;color:var(--muted)">Erro ao carregar mensagens.</p>';
      }
    }


    // ==========================================
    // FUNÇÃO: adicionarMensagemNaTela(msg, rolar)
    // ==========================================
    function adicionarMensagemNaTela(msg, rolar = true) {
      const area = document.getElementById('chat-messages');
      if (!area) return;

      const euEnviei = msg.remetente_id === euUsuario.id;
      const tempo    = Orbita.format.tempo(new Date(msg.criado_em));

      const div = document.createElement('div');
      div.className = 'msg-group';
      div.innerHTML = `
        <div class="msg-bubble ${euEnviei ? 'msg-sent' : 'msg-received'}">
          ${msg.texto}
        </div>
        <div class="msg-time ${euEnviei ? 'sent' : 'received'}">${tempo}</div>
      `;

      area.appendChild(div);

      if (rolar) area.scrollTop = area.scrollHeight;
    }


    // ==========================================
    // FUNÇÃO: enviarMensagem()
    // ==========================================
    async function enviarMensagem() {
      if (!conversaAtiva) return;

      const input = document.getElementById('chat-input');
      const texto = input.value.trim();
      if (!texto) return;

      const btn = document.getElementById('btn-send');
      btn.disabled = true;

      // Exibe a mensagem imediatamente (otimista)
      adicionarMensagemNaTela({
        remetente_id:  euUsuario.id,
        texto,
        criado_em:     new Date().toISOString(),
      });

      input.value = '';
      input.style.height = 'auto';

      try {
        const resposta = await fetch(`${API_URL}/api/mensagens/${conversaAtiva.id}`, {
          method:  'POST',
          headers: {
            'Content-Type':  'application/json',
            'Authorization': `Bearer ${token}`,
          },
          body: JSON.stringify({ texto }),
        });

        if (!resposta.ok) {
          Orbita.toast('Erro ao enviar mensagem', 'error');
        }

        // Atualiza a lista de conversas
        carregarConversas();

      } catch (e) {
        Orbita.toast('Erro ao conectar', 'error');
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }


    // ==========================================
    // FUNÇÃO: marcarComoLida(usuarioId)
    // ==========================================
    async function marcarComoLida(usuarioId) {
      try {
        await fetch(`${API_URL}/api/mensagens/${usuarioId}/ler`, {
          method:  'PUT',
          headers: { 'Authorization': `Bearer ${token}` },
        });
      } catch (e) {}
    }


    // ==========================================
    // FUNÇÃO: teclaEnter(event)
    // Enter envia, Shift+Enter quebra linha
    // ==========================================
    function teclaEnter(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        enviarMensagem();
      }
    }


    // ==========================================
    // FUNÇÃO: autoResize(textarea)
    // Expande o textarea conforme o texto
    // ==========================================
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }


    // ==========================================
    // MODAL: NOVA CONVERSA
    // ==========================================
    function abrirModalNova() {
      document.getElementById('modal-nova').classList.add('open');
    }

    function fecharModal() {
      document.getElementById('modal-nova').classList.remove('open');
      document.getElementById('modal-resultados').innerHTML = '';
    }

    function fecharSeOverlay(e) {
      if (e.target.classList.contains('modal-overlay')) fecharModal();
    }

    const buscarDebounced = Orbita.debounce(async (termo) => {
      const area = document.getElementById('modal-resultados');
      if (termo.length < 2) { area.innerHTML = ''; return; }

      try {
        const resposta = await fetch(`${API_URL}/api/usuarios?busca=${encodeURIComponent(termo)}`);
        const dados    = await resposta.json();

        const outros = dados.usuarios.filter(u => u.handle !== euUsuario.handle);

        if (outros.length === 0) {
          area.innerHTML = '<p style="color:var(--muted);font-size:0.85rem;padding:8px">Nenhum usuário encontrado.</p>';
          return;
        }

        area.innerHTML = outros.map(u => `
          <div class="user-result" onclick="iniciarConversa(${u.id}, '${u.nome}', '${u.handle}', '${u.avatar || '🙂'}')">
            <div class="user-result-avatar">${u.avatar || '🙂'}</div>
            <div>
              <div class="user-result-nome">${u.nome}</div>
              <div class="user-result-handle">@${u.handle}</div>
            </div>
          </div>
        `).join('');

      } catch (e) {}
    }, 400);

    function buscarUsuarioModal(valor) { buscarDebounced(valor); }

    function iniciarConversa(id, nome, handle, avatar) {
      fecharModal();
      abrirConversa(id, nome, handle, avatar);
    }


    // ==========================================
    // FILTRO DE CONVERSAS
    // ==========================================
    function filtrarConversas(termo) {
      if (!termo) { renderizarConversas(todasConversas); return; }
      const filtradas = todasConversas.filter(c =>
        c.outro_nome.toLowerCase().includes(termo.toLowerCase()) ||
        c.outro_handle.toLowerCase().includes(termo.toLowerCase())
      );
      renderizarConversas(filtradas);
    }


    // Fecha modal com Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') fecharModal();
    });

    // Verifica se veio de outro perfil com ?conversa=id
    const params = new URLSearchParams(window.location.search);
    const converساId   = params.get('conversa');
    const conversaNome = params.get('nome');
    const conversaHandle = params.get('handle');
    const conversaAvatar = params.get('avatar');

    // Inicializa
    conectarSocket();
    carregarConversas().then(() => {
      // Abre conversa automaticamente se veio de um perfil
      if (conversaId) {
        abrirConversa(
          parseInt(conversaId),
          conversaNome || 'Usuário',
          conversaHandle || '',
          conversaAvatar || '🙂'
        );
      }
    });

  </script>
</body>
</html>
