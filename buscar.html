<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orbita — Buscar</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,15,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }

    .nav-inner {
      max-width: 700px; margin: 0 auto;
      display: flex; align-items: center;
      height: 60px; gap: 16px;
    }

    .page {
      max-width: 700px; margin: 0 auto;
      padding: 32px 24px;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 1.8rem; font-weight: 800;
      letter-spacing: -0.5px; margin-bottom: 24px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* CAMPO DE BUSCA */
    .search-wrap {
      position: relative;
      margin-bottom: 32px;
      animation: fadeUp 0.4s 0.05s ease both;
    }

    .search-icon {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      color: var(--muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px 14px 44px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input::placeholder { color: var(--muted); }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,255,90,0.08);
    }

    /* Botão de limpar busca */
    .search-clear {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: var(--surface2);
      border: none; border-radius: 50%;
      width: 24px; height: 24px;
      color: var(--muted); font-size: 0.8rem;
      cursor: pointer; display: none;
      align-items: center; justify-content: center;
      transition: all 0.2s;
    }

    .search-clear.visible { display: flex; }
    .search-clear:hover { color: var(--text); background: var(--border); }

    /* RESULTADOS */
    .results-label {
      font-size: 0.72rem; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 12px; font-weight: 500;
    }

    .results-list {
      display: flex; flex-direction: column; gap: 8px;
    }

    /* CARD DE USUÁRIO */
    .user-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex; align-items: center; gap: 16px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      animation: fadeUp 0.3s ease both;
      text-decoration: none; color: inherit;
    }

    .user-card:hover {
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }

    .user-card-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; flex-shrink: 0;
    }

    .user-card-info { flex: 1; min-width: 0; }

    .user-card-nome {
      font-family: var(--font-display); font-weight: 700;
      font-size: 0.95rem; margin-bottom: 2px;
    }

    .user-card-handle { font-size: 0.78rem; color: var(--muted); margin-bottom: 4px; }

    .user-card-bio {
      font-size: 0.8rem; color: var(--muted);
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-seguir {
      padding: 7px 16px; border-radius: 999px;
      font-size: 0.78rem; font-family: var(--font-body); font-weight: 500;
      cursor: pointer; transition: all 0.2s; flex-shrink: 0;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
    }

    .btn-seguir:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    .btn-seguir.seguindo {
      background: rgba(90,255,184,0.1);
      border-color: rgba(90,255,184,0.3);
      color: var(--accent2);
    }

    .btn-seguir.eu { display: none; } /* esconde botão no próprio perfil */

    /* ESTADOS */
    .state-box {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 0.88rem;
    }

    .state-icon { font-size: 2.5rem; margin-bottom: 12px; }

    /* SUGESTÕES — aparecem antes de digitar */
    .suggestions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .suggestion-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
      animation: fadeUp 0.4s ease both;
    }

    .suggestion-card:hover {
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-3px);
    }

    .suggestion-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; margin: 0 auto 10px;
    }

    .suggestion-nome {
      font-family: var(--font-display); font-weight: 700;
      font-size: 0.88rem; margin-bottom: 2px;
    }

    .suggestion-handle { font-size: 0.72rem; color: var(--muted); margin-bottom: 12px; }

    .btn-seguir-sug {
      width: 100%; padding: 7px;
      border-radius: 999px; border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      font-family: var(--font-body); font-size: 0.78rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
    }

    .btn-seguir-sug:hover {
      background: rgba(232,255,90,0.08);
      border-color: rgba(232,255,90,0.3);
      color: var(--accent);
    }

    .btn-seguir-sug.seguindo {
      background: rgba(90,255,184,0.1);
      border-color: rgba(90,255,184,0.3);
      color: var(--accent2);
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-dot"></span>
        Orbita
      </a>
      <div style="display:flex; gap:6px; flex:1; justify-content:center">
        <a href="feed.html"        class="nav-btn">🏠 Feed</a>
        <a href="buscar.html"      class="nav-btn active">🔍 Buscar</a>
        <a href="comunidades.html" class="nav-btn">🌐 Comunidades</a>
        <a href="perfil.html"      class="nav-btn">👤 Perfil</a>
      </div>
    </div>
  </nav>

  <div class="page">

    <div class="page-title">🔍 Buscar pessoas</div>

    <!-- Campo de busca -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input
        class="search-input"
        id="search-input"
        type="text"
        placeholder="Busque por nome ou @handle..."
        oninput="onBusca(this.value)"
        autocomplete="off"
      />
      <button class="search-clear" id="search-clear" onclick="limparBusca()">✕</button>
    </div>

    <!-- Área de resultados -->
    <div id="resultados"></div>

  </div>

  <script src="app.js"></script>
  <script>

    // Proteção de rota
    if (!Orbita.auth.estaLogado()) {
      window.location.href = 'login.html';
    }

    const token     = Orbita.store.ler('token');
    const euUsuario = Orbita.auth.usuario();

    // Estado de seguindo para cada usuário
    // Guardamos aqui para não precisar recarregar
    const estadoSeguindo = {};


    // ==========================================
    // Ao carregar a página, mostra sugestões
    // de pessoas para seguir
    // ==========================================
    carregarSugestoes();


    // ==========================================
    // FUNÇÃO: carregarSugestoes()
    // Busca todos os usuários e mostra como
    // sugestões antes de o usuário digitar
    // ==========================================
    async function carregarSugestoes() {
      const area = document.getElementById('resultados');

      area.innerHTML = `
        <div class="results-label">Pessoas que você pode conhecer</div>
        <div class="suggestions-grid" id="sugestoes-grid">
          ${[1,2,3].map(() => `
            <div class="suggestion-card">
              <div class="skeleton-circle" style="width:56px;height:56px;margin:0 auto 10px"></div>
              <div class="skeleton-line" style="width:70%;margin:0 auto 6px"></div>
              <div class="skeleton-line" style="width:50%;margin:0 auto 12px"></div>
              <div class="skeleton-line" style="height:30px;border-radius:999px"></div>
            </div>
          `).join('')}
        </div>
      `;

      try {
        // Busca todos com uma letra genérica
        const resposta = await fetch(`${API_URL}/api/usuarios?busca=a`);
        const dados    = await resposta.json();

        // Filtra o próprio usuário
        const outros = dados.usuarios.filter(u => u.handle !== euUsuario?.handle);

        if (outros.length === 0) {
          area.innerHTML = `
            <div class="state-box">
              <div class="state-icon">👥</div>
              <p>Nenhum usuário cadastrado ainda.</p>
            </div>
          `;
          return;
        }

        const grid = document.getElementById('sugestoes-grid');
        grid.innerHTML = outros.map((u, i) => {
          estadoSeguindo[u.id] = false; // começa como não seguindo
          return `
            <div class="suggestion-card" style="animation-delay:${i * 0.07}s"
                 onclick="irParaPerfil('${u.handle}')">
              <div class="suggestion-avatar">${u.avatar || '🙂'}</div>
              <div class="suggestion-nome">${u.nome}</div>
              <div class="suggestion-handle">@${u.handle}</div>
              <button
                class="btn-seguir-sug"
                id="sug-btn-${u.id}"
                onclick="event.stopPropagation(); toggleSeguir(${u.id}, 'sug-btn-${u.id}')">
                + Seguir
              </button>
            </div>
          `;
        }).join('');

      } catch (e) {
        area.innerHTML = `<div class="state-box">Erro ao carregar sugestões.</div>`;
      }
    }


    // ==========================================
    // FUNÇÃO: onBusca(valor)
    // Chamada a cada tecla digitada.
    // Usa debounce para não chamar a API
    // a cada letra — espera 400ms de pausa.
    // ==========================================
    const buscarDebounced = Orbita.debounce(async (termo) => {
      const area = document.getElementById('resultados');

      if (termo.length === 0) {
        carregarSugestoes();
        return;
      }

      if (termo.length < 2) {
        area.innerHTML = `
          <div class="state-box">
            <div class="state-icon">⌨️</div>
            <p>Digite pelo menos 2 caracteres.</p>
          </div>
        `;
        return;
      }

      // Esqueleto de carregamento
      area.innerHTML = `
        <div class="results-label">Buscando...</div>
        <div class="results-list">
          ${[1,2].map(() => `
            <div class="user-card" style="cursor:default">
              <div class="skeleton-circle" style="width:52px;height:52px"></div>
              <div style="flex:1">
                <div class="skeleton-line" style="width:40%"></div>
                <div class="skeleton-line" style="width:25%;margin-bottom:0"></div>
              </div>
            </div>
          `).join('')}
        </div>
      `;

      try {
        const resposta = await fetch(
          `${API_URL}/api/usuarios?busca=${encodeURIComponent(termo)}`
        );
        const dados = await resposta.json();

        // Filtra o próprio usuário dos resultados
        const resultados = dados.usuarios.filter(u => u.handle !== euUsuario?.handle);

        if (resultados.length === 0) {
          area.innerHTML = `
            <div class="state-box">
              <div class="state-icon">🌌</div>
              <p>Nenhum usuário encontrado para "<strong>${termo}</strong>".</p>
            </div>
          `;
          return;
        }

        area.innerHTML = `
          <div class="results-label">${resultados.length} resultado${resultados.length > 1 ? 's' : ''}</div>
          <div class="results-list">
            ${resultados.map((u, i) => `
              <div class="user-card" style="animation-delay:${i * 0.06}s"
                   onclick="irParaPerfil('${u.handle}')">
                <div class="user-card-avatar">${u.avatar || '🙂'}</div>
                <div class="user-card-info">
                  <div class="user-card-nome">${destacar(u.nome, termo)}</div>
                  <div class="user-card-handle">@${destacar(u.handle, termo)}</div>
                  ${u.bio ? `<div class="user-card-bio">${u.bio}</div>` : ''}
                </div>
                <button
                  class="btn-seguir ${estadoSeguindo[u.id] ? 'seguindo' : ''}"
                  id="res-btn-${u.id}"
                  onclick="event.stopPropagation(); toggleSeguir(${u.id}, 'res-btn-${u.id}')">
                  ${estadoSeguindo[u.id] ? '✓ Seguindo' : '+ Seguir'}
                </button>
              </div>
            `).join('')}
          </div>
        `;

      } catch (e) {
        area.innerHTML = `<div class="state-box">Erro ao buscar. Tente novamente.</div>`;
      }

    }, 400);

    function onBusca(valor) {
      // Mostra/esconde botão de limpar
      const clearBtn = document.getElementById('search-clear');
      clearBtn.classList.toggle('visible', valor.length > 0);

      buscarDebounced(valor);
    }


    // ==========================================
    // FUNÇÃO: destacar(texto, termo)
    // Destaca o termo buscado no texto
    // com uma cor diferente.
    // ==========================================
    function destacar(texto, termo) {
      if (!termo) return texto;
      // RegExp com flag 'gi' = busca global e sem case
      const regex = new RegExp(`(${termo})`, 'gi');
      return texto.replace(regex, `<mark style="background:rgba(232,255,90,0.3);color:var(--text);border-radius:3px">$1</mark>`);
    }


    // ==========================================
    // FUNÇÃO: limparBusca()
    // Limpa o campo e volta para as sugestões
    // ==========================================
    function limparBusca() {
      const input = document.getElementById('search-input');
      input.value = '';
      input.focus();
      document.getElementById('search-clear').classList.remove('visible');
      carregarSugestoes();
    }


    // ==========================================
    // FUNÇÃO: toggleSeguir(id, btnId)
    // Segue ou deixa de seguir um usuário
    // ==========================================
    async function toggleSeguir(id, btnId) {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      btn.disabled = true;

      try {
        const resposta = await fetch(`${API_URL}/api/usuarios/${id}/seguir`, {
          method:  'POST',
          headers: { 'Authorization': `Bearer ${token}` },
        });

        const dados = await resposta.json();
        if (!resposta.ok) { Orbita.toast(dados.erro || 'Erro', 'error'); return; }

        // Atualiza estado local
        estadoSeguindo[id] = dados.seguindo;

        // Atualiza o botão
        btn.textContent = dados.seguindo ? '✓ Seguindo' : '+ Seguir';
        btn.classList.toggle('seguindo', dados.seguindo);

        Orbita.toast(dados.seguindo ? 'Seguindo! 🎉' : 'Deixou de seguir', 'default');

      } catch (e) {
        Orbita.toast('Erro ao conectar', 'error');
      } finally {
        btn.disabled = false;
      }
    }


    // ==========================================
    // FUNÇÃO: irParaPerfil(handle)
    // ==========================================
    function irParaPerfil(handle) {
      window.location.href = `perfil.html?usuario=${handle}`;
    }


    // Foca no campo de busca ao carregar
    document.getElementById('search-input').focus();

  </script>
</body>
</html>
