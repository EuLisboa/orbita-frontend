<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orbita — Página não encontrada</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23e8ff5a'/><text x='50' y='68' text-anchor='middle' font-size='55' fill='%23000'>✦</text></svg>"/>
  <meta name="theme-color" content="#0d0d0f"/>
  <style>
    :root {
      --bg:      #0d0d0f;
      --surface: #16161a;
      --accent:  #e8ff5a;
      --accent2: #5affb8;
      --accent3: #ff5a8a;
      --text:    #f0f0f0;
      --muted:   #888;
      --border:  rgba(255,255,255,0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background:  var(--bg);
      color:       var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height:  100vh;
      display:     flex;
      align-items: center;
      justify-content: center;
      text-align:  center;
      padding:     24px;
      overflow:    hidden;
    }

    /* Fundo animado */
    .bg-glow { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .bg-glow::before {
      content: ''; position: absolute;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(232,255,90,0.06) 0%, transparent 70%);
      top: -150px; left: -100px;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .bg-glow::after {
      content: ''; position: absolute;
      width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,90,138,0.05) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation: drift 15s ease-in-out infinite alternate reverse;
    }
    @keyframes drift {
      from { transform: translate(0,0); }
      to   { transform: translate(40px, 30px); }
    }

    .content {
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Número 404 grande */
    .error-code {
      font-family: 'Syne', sans-serif;
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 800;
      letter-spacing: -4px;
      line-height: 1;
      color: var(--surface);
      position: relative;
      margin-bottom: 8px;
    }

    /* Texto sobreposto no 404 */
    .error-code::after {
      content: '404';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0.15;
    }

    .error-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .error-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    .error-sub {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 380px;
      margin: 0 auto 36px;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(232,255,90,0.2);
    }

    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.15);
    }

    /* Logo no topo */
    .logo {
      position: fixed;
      top: 24px; left: 24px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      color: var(--accent);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 7px;
      z-index: 10;
    }

    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent3);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(1.5); opacity: 0.5; }
    }
  </style>
</head>
<body>

  <div class="bg-glow"></div>

  <a href="index.html" class="logo">
    <span class="logo-dot"></span>
    Orbita
  </a>

  <div class="content">
    <div class="error-code">404</div>
    <div class="error-icon">🌌</div>
    <div class="error-title">Página perdida no espaço</div>
    <p class="error-sub">
      Essa página não existe ou foi movida para outra órbita.
      Mas não se preocupe — você pode voltar para o início!
    </p>
    <div class="btn-group">
      <a href="index.html" class="btn btn-primary">✦ Voltar para o início</a>
      <a href="feed.html"  class="btn btn-secondary">🏠 Ir para o feed</a>
    </div>
  </div>

</body>
</html>
