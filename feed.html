<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orbita — Feed</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,15,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }

    .nav-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center;
      height: 60px; gap: 16px;
    }

    .nav-links {
      display: flex; gap: 4px;
      flex: 1; justify-content: center;
    }

    .nav-link {
      padding: 7px 16px; border-radius: 999px;
      font-size: 0.82rem; font-family: var(--font-body);
      cursor: pointer; text-decoration: none;
      transition: all 0.2s; border: none;
      background: transparent; color: var(--muted);
    }

    .nav-link:hover { color: var(--text); }
    .nav-link.active { background: var(--surface2); color: var(--text); }

    .nav-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--surface2); border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; cursor: pointer; text-decoration: none;
    }

    .page {
      max-width: 1100px; margin: 0 auto;
      padding: 28px 24px;
      display: grid;
      grid-template-columns: 220px 1fr 260px;
      gap: 24px; align-items: start;
    }

    /* COLUNA ESQUERDA */
    .left-col {
      position: sticky; top: 80px;
      display: flex; flex-direction: column; gap: 8px;
    }

    .menu-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 12px;
      font-size: 0.88rem; color: var(--muted);
      cursor: pointer; transition: all 0.2s;
      text-decoration: none; border: none;
      background: transparent; font-family: var(--font-body);
      width: 100%; text-align: left;
    }

    .menu-item:hover { background: var(--surface); color: var(--text); }
    .menu-item.active { background: var(--surface); color: var(--text); font-weight: 500; }
    .menu-icon { font-size: 1.1rem; width: 24px; text-align: center; }
    .menu-divider { height: 1px; background: var(--border); margin: 8px 0; }
    .menu-label {
      font-size: 0.68rem; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted);
      padding: 4px 14px; opacity: 0.6;
    }

    /* FEED */
    .feed-col { display: flex; flex-direction: column; gap: 16px; }

    .feed-filters {
      display: flex; gap: 6px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 8px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .filter-tab {
      flex: 1; padding: 8px; border-radius: 10px;
      border: none; background: transparent; color: var(--muted);
      font-family: var(--font-body); font-size: 0.82rem;
      cursor: pointer; transition: all 0.2s; text-align: center;
    }

    .filter-tab:hover { color: var(--text); }
    .filter-tab.active { background: var(--surface2); color: var(--text); font-weight: 500; }

    /* CAIXA DE POST */
    .post-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px;
      animation: fadeUp 0.4s 0.05s ease both;
    }

    .post-input-row { display: flex; gap: 12px; align-items: flex-start; }

    .post-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--surface2); border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }

    .post-textarea {
      flex: 1; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 11px 14px; color: var(--text);
      font-family: var(--font-body); font-size: 0.88rem;
      resize: none; outline: none; min-height: 72px;
      transition: border-color 0.2s, min-height 0.3s;
    }

    .post-textarea::placeholder { color: var(--muted); }
    .post-textarea:focus { border-color: var(--accent); min-height: 100px; }

    .post-bottom {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-top: 12px; padding-left: 50px;
    }

    .post-tools { display: flex; gap: 4px; }

    .tool-btn {
      width: 32px; height: 32px; border-radius: 8px;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-size: 0.9rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }

    .tool-btn:hover { background: var(--surface2); color: var(--text); }

    .char-count { font-size: 0.72rem; color: var(--muted); }
    .char-count.warning { color: var(--accent); }
    .char-count.limit   { color: var(--accent3); }

    .post-submit {
      padding: 8px 18px; background: var(--accent); color: #000;
      border: none; border-radius: 999px;
      font-family: var(--font-body); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }

    .post-submit:hover { box-shadow: 0 4px 16px rgba(232,255,90,0.2); }
    .post-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    /* CARD DE POST */
    .post-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px;
      transition: border-color 0.2s; animation: fadeUp 0.4s ease both;
    }

    .post-card:hover { border-color: rgba(255,255,255,0.1); }

    .post-header { display: flex; align-items: center; gap: 11px; margin-bottom: 12px; }

    .post-user-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }

    .post-user-info { flex: 1; }

    .post-user-name {
      font-family: var(--font-display); font-weight: 600; font-size: 0.88rem;
    }

    .post-meta { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--muted); }

    .post-community-tag {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 999px; padding: 2px 8px;
      font-size: 0.68rem; color: var(--accent2);
    }

    .post-text { font-size: 0.88rem; line-height: 1.7; color: #d0d0d0; margin-bottom: 14px; white-space: pre-wrap; }

    .post-reactions {
      display: flex; gap: 4px;
      padding-top: 12px; border-top: 1px solid var(--border); flex-wrap: wrap;
    }

    .reaction-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 11px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-size: 0.78rem;
      font-family: var(--font-body); cursor: pointer; transition: all 0.2s;
    }

    .reaction-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }
    .reaction-btn.active { background: rgba(232,255,90,0.08); border-color: rgba(232,255,90,0.3); color: var(--accent); }

    /* ESTADO VAZIO */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 0.88rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .empty-state-icon { font-size: 2.5rem; margin-bottom: 12px; }

    /* COLUNA DIREITA */
    .right-col {
      position: sticky; top: 80px;
      display: flex; flex-direction: column; gap: 16px;
    }

    .widget {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px;
      animation: fadeUp 0.5s ease both;
    }

    .widget-title { font-family: var(--font-display); font-weight: 700; font-size: 0.88rem; margin-bottom: 14px; }

    /* Perfil resumido no widget */
    .widget-profile { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .widget-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--surface2); border: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
    }
    .widget-nome { font-family: var(--font-display); font-weight: 700; font-size: 0.9rem; }
    .widget-handle { font-size: 0.75rem; color: var(--muted); }

    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; }
      .left-col, .right-col { display: none; }
    }

    /* COMENTÁRIOS */
.comments-section {
  display: none;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}

.comments-section.open { display: block; }

.comment-input-row {
  display: flex; gap: 10px;
  align-items: center; margin-bottom: 12px;
}

.comment-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; flex-shrink: 0;
}

.comment-input {
  flex: 1; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 999px;
  padding: 8px 14px; color: var(--text);
  font-family: var(--font-body); font-size: 0.82rem;
  outline: none; transition: border-color 0.2s;
}

.comment-input::placeholder { color: var(--muted); }
.comment-input:focus { border-color: var(--accent2); }

.comment-send {
  width: 30px; height: 30px; border-radius: 50%;
  border: none; background: var(--accent2); color: #000;
  font-size: 0.8rem; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}

.comment-send:hover { transform: scale(1.1); }

.comment-item {
  display: flex; gap: 10px;
  margin-bottom: 10px;
  animation: fadeUp 0.3s ease both;
}

.comment-body {
  flex: 1; background: var(--surface2);
  border-radius: 12px; padding: 9px 13px;
}

.comment-name {
  font-family: var(--font-display); font-size: 0.78rem;
  font-weight: 600; margin-bottom: 2px;
}

.comment-text { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }

.notif-badge {
  position: absolute;
  top: 2px; right: 2px;
  min-width: 16px; height: 16px;
  border-radius: 999px;
  background: var(--accent3);
  border: 2px solid var(--bg);
  color: #fff;
  font-size: 0.6rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 3px;
}
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-dot"></span>
        Orbita
      </a>
      <div class="nav-links">
      <a href="feed.html"        class="nav-link active">🏠 Feed</a>
      <a href="buscar.html"      class="nav-link">🔍 Buscar</a>
      <a href="comunidades.html" class="nav-link">🌐 Comunidades</a>
      <a href="perfil.html"      class="nav-link">👤 Perfil</a>
      </div>
      <div style="display:flex; align-items:center; gap:8px; flex-shrink:0">
       <button class="nav-icon-btn" title="Notificações" onclick="abrirNotificacoes()" id="btn-notif" style="position:relative">
        🔔
       <span class="notif-badge" id="notif-badge" style="display:none"></span>
       </button>
       <a href="perfil.html" class="nav-avatar" id="nav-avatar">🙂</a>
       <button class="nav-btn" onclick="Orbita.auth.logout()">Sair</button>
      </div>
      </div>
  </nav>

  <!-- LAYOUT 3 COLUNAS -->
  <div class="page">

    <!-- ESQUERDA -->
    <aside class="left-col">
      <a href="feed.html"        class="menu-item active"><span class="menu-icon">🏠</span> Feed</a>
      <a href="perfil.html"      class="menu-item"><span class="menu-icon">👤</span> Meu perfil</a>
      <a href="comunidades.html" class="menu-item"><span class="menu-icon">🌐</span> Comunidades</a>
      <button class="menu-item" onclick="Orbita.auth.logout()"><span class="menu-icon">🚪</span> Sair</button>
    </aside>

    <!-- FEED -->
    <main class="feed-col">

      <!-- Filtros -->
      <div class="feed-filters">
        <button class="filter-tab active">✦ Para você</button>
        <button class="filter-tab">👥 Amigos</button>
        <button class="filter-tab">🌐 Comunidades</button>
      </div>

      <!-- Caixa de novo post -->
      <div class="post-box">
        <div class="post-input-row">
          <div class="post-avatar" id="post-avatar">🙂</div>
          <textarea
            class="post-textarea"
            id="post-input"
            placeholder="Compartilhe algo com sua órbita..."
            oninput="atualizarContador(this)"
            maxlength="280"
          ></textarea>
        </div>
        <div class="post-bottom">
          <div class="post-tools">
            <button class="tool-btn" title="Emoji">😊</button>
            <button class="tool-btn" title="Localização">📍</button>
          </div>
          <div style="display:flex; align-items:center; gap:12px">
            <span class="char-count" id="char-count">280</span>
            <button class="post-submit" id="btn-publicar" onclick="publicarPost()" disabled>
              Publicar →
            </button>
          </div>
        </div>
      </div>

      <!-- Lista de posts -->
      <div id="feed-lista"></div>

    </main>

    <!-- DIREITA -->
    <aside class="right-col">
      <div class="widget">
        <div class="widget-profile">
          <div class="widget-avatar" id="widget-avatar">🙂</div>
          <div>
            <div class="widget-nome"  id="widget-nome">Carregando...</div>
            <div class="widget-handle" id="widget-handle"></div>
          </div>
        </div>
        <a href="perfil.html" class="btn btn-secondary" style="width:100%; text-align:center; display:block; padding:9px">
          Ver meu perfil
        </a>
      </div>

      <div class="widget" style="animation-delay:0.1s">
        <div class="widget-title">🔥 Em alta</div>
        <div style="font-size:0.82rem; color:var(--muted); line-height:2">
          <div>#ProgramadoresBR</div>
          <div>#DesignUI</div>
          <div>#Orbita</div>
          <div>#JavaScript</div>
        </div>
      </div>
    </aside>

  </div>

  <script src="app.js"></script>
  <script>

    // ==========================================
    // PROTEÇÃO DE ROTA
    // Se não estiver logado, volta pro login
    // ==========================================
    if (!Orbita.auth.estaLogado()) {
      window.location.href = 'login.html';
    }

    // Pega os dados do usuário logado do localStorage
    const usuario = Orbita.auth.usuario();

    // Atualiza o avatar e nome na interface
    if (usuario) {
      document.getElementById('nav-avatar').textContent    = usuario.avatar || '🙂';
      document.getElementById('post-avatar').textContent   = usuario.avatar || '🙂';
      document.getElementById('widget-avatar').textContent = usuario.avatar || '🙂';
      document.getElementById('widget-nome').textContent   = usuario.nome;
      document.getElementById('widget-handle').textContent = '@' + usuario.handle;
    }

    // Token salvo no localStorage — enviado em toda requisição protegida
    const token = Orbita.store.ler('token');
    
    // ==========================================
// FUNÇÃO: irParaPerfil(handle)
// ==========================================
function irParaPerfil(handle) {
  window.location.href = `perfil.html?usuario=${handle}`;
}


// ==========================================
// FUNÇÃO: toggleComentarios(postId)
// Abre/fecha a seção de comentários
// e carrega os comentários da API
// ==========================================
async function toggleComentarios(postId) {
  const section = document.getElementById('comments-' + postId);
  const aberto  = section.classList.contains('open');

  section.classList.toggle('open', !aberto);

  if (!aberto) {
    // Carrega os comentários ao abrir
    await carregarComentarios(postId);
    document.getElementById('cinput-' + postId).focus();
  }
}


// ==========================================
// FUNÇÃO: carregarComentarios(postId)
// Busca os comentários do post na API
// ==========================================
async function carregarComentarios(postId) {
  const lista = document.getElementById('clist-' + postId);
  lista.innerHTML = '<div class="skeleton-line" style="margin-top:8px"></div>';

  try {
    const resposta = await fetch(`${API_URL}/api/posts/${postId}`);
    const dados    = await resposta.json();

    if (!resposta.ok || dados.comentarios.length === 0) {
      lista.innerHTML = '';
      return;
    }

    lista.innerHTML = dados.comentarios.map(c => `
      <div class="comment-item">
        <div class="comment-avatar">${c.autor_avatar || '🙂'}</div>
        <div class="comment-body">
          <div class="comment-name">${c.autor_nome}</div>
          <div class="comment-text">${c.texto}</div>
        </div>
      </div>
    `).join('');

  } catch (e) {
    lista.innerHTML = '';
  }
}


// ==========================================
// FUNÇÃO: enviarComentario(postId)
// Envia o comentário para a API
// ==========================================
async function enviarComentario(postId) {
  const input = document.getElementById('cinput-' + postId);
  const texto = input.value.trim();
  if (!texto) return;

  try {
    const resposta = await fetch(`${API_URL}/api/posts/${postId}/comentarios`, {
      method:  'POST',
      headers: {
        'Content-Type':  'application/json',
        'Authorization': `Bearer ${token}`,
      },
      body: JSON.stringify({ texto }),
    });

    const dados = await resposta.json();
    if (!resposta.ok) { Orbita.toast(dados.erro || 'Erro', 'error'); return; }

    // Adiciona o comentário na lista sem recarregar
    const lista = document.getElementById('clist-' + postId);
    lista.insertAdjacentHTML('beforeend', `
      <div class="comment-item" style="animation: fadeUp 0.3s ease both">
        <div class="comment-avatar">${usuario?.avatar || '🙂'}</div>
        <div class="comment-body">
          <div class="comment-name">${usuario?.nome || 'Você'}</div>
          <div class="comment-text">${texto}</div>
        </div>
      </div>
    `);

    input.value = '';

    // Atualiza o contador de comentários
    const countEl = document.getElementById('ccount-' + postId);
    countEl.textContent = parseInt(countEl.textContent) + 1;

    lista.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  } catch (e) {
    Orbita.toast('Erro ao enviar comentário', 'error');
  }
}

    // ==========================================
    // FUNÇÃO: carregarFeed()
    // Busca os posts da API e renderiza na tela
    // ==========================================
    async function carregarFeed() {
      const lista = document.getElementById('feed-lista');

      // Mostra esqueletos de carregamento
      lista.innerHTML = `
        ${[1,2,3].map(() => `
          <div class="post-card">
            <div style="display:flex; gap:12px; align-items:center; margin-bottom:14px">
              <div class="skeleton-circle" style="width:40px;height:40px"></div>
              <div style="flex:1">
                <div class="skeleton-line" style="width:40%"></div>
                <div class="skeleton-line" style="width:25%;margin-bottom:0"></div>
              </div>
            </div>
            <div class="skeleton-line"></div>
            <div class="skeleton-line" style="width:75%;margin-bottom:0"></div>
          </div>
        `).join('')}
      `;

      try {
        // Busca os posts da API — rota pública, sem token
        const resposta = await fetch(`${API_URL}/api/posts`);
        const dados    = await resposta.json();

        if (!resposta.ok) throw new Error(dados.erro);

        if (dados.posts.length === 0) {
          lista.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">🌌</div>
              <p>Nenhum post ainda.</p>
              <p style="margin-top:8px">Seja o primeiro a publicar!</p>
            </div>
          `;
          return;
        }

        // Renderiza cada post
        lista.innerHTML = '';
        dados.posts.forEach((post, i) => {
          lista.insertAdjacentHTML('beforeend', criarCardPost(post, i));
        });

      } catch (e) {
        lista.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">⚠️</div>
            <p>Erro ao carregar o feed.</p>
            <p style="margin-top:8px; font-size:0.78rem">Verifique se o servidor está rodando.</p>
          </div>
        `;
      }

      // Verifica notificações ao carregar e a cada 30 segundos
          verificarNotificacoes();
          setInterval(verificarNotificacoes, 30000);
    }


    // ==========================================
    // FUNÇÃO: criarCardPost(post, index)
    // Gera o HTML de um card de post.
    // ==========================================
    function criarCardPost(post, index = 0) {
  const tempo = Orbita.format.tempo(new Date(post.criado_em));

  return `
    <div class="post-card" id="card-${post.id}" style="animation-delay:${index * 0.07}s">
      <div class="post-header">
        <div class="post-user-avatar" onclick="irParaPerfil('${post.autor_handle}')">${post.autor_avatar || '🙂'}</div>
        <div class="post-user-info">
          <div class="post-user-name" onclick="irParaPerfil('${post.autor_handle}')">${post.autor_nome}</div>
          <div class="post-meta">
            <span>${tempo}</span>
            ${post.comunidade
              ? `<span>·</span><span class="post-community-tag">🌐 ${post.comunidade}</span>`
              : ''}
          </div>
        </div>
        ${post.autor_id === usuario?.id
          ? `<button class="reaction-btn" onclick="deletarPost(${post.id})" title="Deletar">🗑️</button>`
          : ''}
      </div>

      <div class="post-text">${post.texto}</div>

      <div class="post-reactions">
        <button
          class="reaction-btn ${post.curtido ? 'active' : ''}"
          id="like-${post.id}"
          onclick="curtirPost(${post.id})">
          ✦ <span id="count-${post.id}">${post.curtidas}</span>
        </button>
        <button class="reaction-btn" onclick="toggleComentarios(${post.id})">
          💬 <span id="ccount-${post.id}">${post.comentarios}</span>
        </button>
        <button class="reaction-btn" onclick="Orbita.copiar(window.location.href)">
          ↗ Compartilhar
        </button>
      </div>

      <!-- Seção de comentários -->
      <div class="comments-section" id="comments-${post.id}">
        <div class="comment-input-row">
          <div class="comment-avatar">${usuario?.avatar || '🙂'}</div>
          <input
            class="comment-input"
            type="text"
            placeholder="Escreva um comentário..."
            id="cinput-${post.id}"
            onkeydown="if(event.key==='Enter') enviarComentario(${post.id})"
          />
          <button class="comment-send" onclick="enviarComentario(${post.id})">→</button>
        </div>
        <div id="clist-${post.id}"></div>
      </div>
    </div>
  `;
}


    // ==========================================
    // FUNÇÃO: publicarPost()
    // Envia o post para a API
    // ==========================================
    async function publicarPost() {
      const input = document.getElementById('post-input');
      const texto = input.value.trim();
      const btn   = document.getElementById('btn-publicar');

      if (!texto) return;

      btn.disabled    = true;
      btn.textContent = 'Publicando...';

      try {
        const resposta = await fetch(`${API_URL}/api/posts`, {
          method:  'POST',
          headers: {
            'Content-Type':  'application/json',
            'Authorization': `Bearer ${token}`, // envia o token!
          },
          body: JSON.stringify({ texto }),
        });

        const dados = await resposta.json();

        if (!resposta.ok) {
          Orbita.toast(dados.erro || 'Erro ao publicar', 'error');
          return;
        }

        // Limpa o textarea
        input.value = '';
        document.getElementById('char-count').textContent = '280';

        Orbita.toast('Post publicado! ✦', 'success');

        // Recarrega o feed para mostrar o novo post
        carregarFeed();

      } catch (e) {
        Orbita.toast('Erro ao conectar ao servidor', 'error');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Publicar →';
        btn.disabled    = true; // desativa até o usuário digitar algo
      }
    }


    // ==========================================
    // FUNÇÃO: curtirPost(id)
    // Curte ou descurte um post via API
    // ==========================================
    async function curtirPost(id) {
      const btn   = document.getElementById('like-' + id);
      const count = document.getElementById('count-' + id);

      try {
        const resposta = await fetch(`${API_URL}/api/posts/${id}/curtir`, {
          method:  'POST',
          headers: { 'Authorization': `Bearer ${token}` },
        });

        const dados = await resposta.json();

        if (!resposta.ok) {
          Orbita.toast(dados.erro || 'Erro ao curtir', 'error');
          return;
        }

        // Atualiza o visual do botão
        btn.classList.toggle('active', dados.curtido);
        count.textContent = dados.curtidas;

        // Animação de feedback
        btn.style.transform = 'scale(1.15)';
        setTimeout(() => { btn.style.transform = ''; }, 150);

      } catch (e) {
        Orbita.toast('Erro ao conectar ao servidor', 'error');
      }
    }


    // ==========================================
    // FUNÇÃO: deletarPost(id)
    // Deleta um post via API
    // ==========================================
    async function deletarPost(id) {
      if (!confirm('Tem certeza que quer deletar esse post?')) return;

      try {
        const resposta = await fetch(`${API_URL}/api/posts/${id}`, {
          method:  'DELETE',
          headers: { 'Authorization': `Bearer ${token}` },
        });

        if (!resposta.ok) {
          const dados = await resposta.json();
          Orbita.toast(dados.erro || 'Erro ao deletar', 'error');
          return;
        }

        // Remove o card da tela com animação
        const card = document.getElementById('card-' + id);
        card.style.opacity   = '0';
        card.style.transform = 'translateY(-8px)';
        card.style.transition = 'all 0.3s ease';
        setTimeout(() => card.remove(), 300);

        Orbita.toast('Post deletado', 'default');

      } catch (e) {
        Orbita.toast('Erro ao conectar ao servidor', 'error');
      }
    }


    // ==========================================
    // FUNÇÃO: atualizarContador(textarea)
    // ==========================================
    function atualizarContador(el) {
      const restante = 280 - el.value.length;
      const countEl  = document.getElementById('char-count');
      const btn      = document.getElementById('btn-publicar');

      countEl.textContent = restante;
      countEl.className   = 'char-count';
      if (restante <= 20) countEl.classList.add('warning');
      if (restante <= 0)  countEl.classList.add('limit');

      btn.disabled = el.value.trim().length === 0;
    }

    // Publicar com Ctrl+Enter
    document.getElementById('post-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.ctrlKey) publicarPost();
    });

    // Carrega o feed ao abrir a página
    carregarFeed();

    // ==========================================
// NOTIFICAÇÕES
// ==========================================

// Ícones por tipo
const notifIcones = {
  curtida:    '✦',
  comentario: '💬',
  seguidor:   '👤',
};

// Verifica notificações não lidas ao carregar
async function verificarNotificacoes() {
  try {
    const resposta = await fetch(`${API_URL}/api/notificacoes/nao-lidas`, {
      headers: { 'Authorization': `Bearer ${token}` },
    });
    const dados = await resposta.json();

    const badge = document.getElementById('notif-badge');
    if (dados.total > 0) {
      badge.style.display = 'flex';
      badge.textContent   = dados.total > 9 ? '9+' : dados.total;
    } else {
      badge.style.display = 'none';
    }
  } catch (e) {}
}

async function abrirNotificacoes() {
  document.getElementById('modal-notif').classList.add('open');
  const lista = document.getElementById('notif-lista');
  lista.innerHTML = '<div style="padding:20px"><div class="skeleton-line"></div><div class="skeleton-line"></div></div>';

  try {
    const resposta = await fetch(`${API_URL}/api/notificacoes`, {
      headers: { 'Authorization': `Bearer ${token}` },
    });
    const dados = await resposta.json();

    if (dados.notificacoes.length === 0) {
      lista.innerHTML = `
        <div style="text-align:center;padding:40px;color:var(--muted);font-size:0.88rem">
          <div style="font-size:2rem;margin-bottom:12px">🔔</div>
          <p>Nenhuma notificação ainda.</p>
        </div>
      `;
      return;
    }

    lista.innerHTML = dados.notificacoes.map(n => `
      <div style="
        display:flex; align-items:center; gap:14px;
        padding:14px 20px; border-bottom:1px solid var(--border);
        background:${n.lida ? 'transparent' : 'rgba(232,255,90,0.03)'};
        cursor:pointer; transition:background 0.2s;
      " onclick="clicarNotificacao(${n.id}, ${n.origem_id}, '${n.tipo}')">
        <div style="
          width:38px; height:38px; border-radius:50%;
          background:var(--surface2); display:flex;
          align-items:center; justify-content:center; font-size:1rem; flex-shrink:0;
        ">${notifIcones[n.tipo] || '🔔'}</div>
        <div style="flex:1">
          <div style="font-size:0.85rem;color:var(--text);line-height:1.4">${n.mensagem}</div>
          <div style="font-size:0.72rem;color:var(--muted);margin-top:3px">
            ${Orbita.format.tempo(new Date(n.criado_em))}
          </div>
        </div>
        ${!n.lida ? '<div style="width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0"></div>' : ''}
      </div>
    `).join('');

    // Marca como lidas após abrir
    marcarTodasLidas();

  } catch (e) {
    lista.innerHTML = '<div style="padding:20px;color:var(--muted)">Erro ao carregar.</div>';
  }
}

async function marcarTodasLidas() {
  try {
    await fetch(`${API_URL}/api/notificacoes/ler`, {
      method:  'PUT',
      headers: { 'Authorization': `Bearer ${token}` },
    });
    document.getElementById('notif-badge').style.display = 'none';
  } catch (e) {}
}

function clicarNotificacao(id, origemId, tipo) {
  fecharModal('modal-notif');
  if (tipo === 'curtida' || tipo === 'comentario') {
    // Rola até o post no feed
    const card = document.getElementById('card-' + origemId);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else if (tipo === 'seguidor') {
    window.location.href = `perfil.html?usuario=${origemId}`;
  }
}

function fecharNotifSeOverlay(e) {
  if (e.target.classList.contains('modal-overlay')) fecharModal('modal-notif');
}

  //<!-- MODAL: NOTIFICAÇÕES -->
<div class="modal-overlay" id="modal-notif" onclick="fecharNotifSeOverlay(event)">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <div class="modal-title">🔔 Notificações</div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="nav-btn" onclick="marcarTodasLidas()" style="font-size:0.75rem">
          Marcar todas como lidas
        </button>
        <button class="modal-close" onclick="fecharModal('modal-notif')">✕</button>
      </div>
    </div>
    <div class="modal-body" style="padding:0">
      <div id="notif-lista"></div>
    </div>
  </div>
</div>
