<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orbita — Perfil</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23e8ff5a'/><text x='50' y='68' text-anchor='middle' font-size='55' fill='%23000'>✦</text></svg>"/>
  <style>
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,15,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }

    .nav-inner {
      max-width: 1000px; margin: 0 auto;
      display: flex; align-items: center;
      justify-content: space-between; height: 60px;
    }

    .nav-actions { display: flex; align-items: center; gap: 8px; }

    .page {
      max-width: 1000px; margin: 0 auto;
      padding: 32px 24px;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 24px; align-items: start;
    }

    .sidebar {
      display: flex; flex-direction: column; gap: 16px;
      position: sticky; top: 80px;
    }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .profile-cover {
      height: 90px;
      background: linear-gradient(135deg, #1a2a0a, #0a1a20, #1a0a1a);
      position: relative;
    }

    .cover-pattern {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(232,255,90,0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 50%, rgba(90,255,184,0.1) 0%, transparent 50%);
    }

    .profile-body { padding: 0 20px 20px; }

    .avatar-wrap {
      margin-top: -32px; margin-bottom: 12px;
      position: relative; display: inline-block;
    }

    .avatar-main {
      width: 64px; height: 64px; border-radius: 50%;
      border: 3px solid var(--bg); background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
    }

    .avatar-status {
      position: absolute; bottom: 2px; right: 2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent2); border: 2px solid var(--bg);
    }

    .profile-name {
      font-family: var(--font-display); font-weight: 700; font-size: 1.1rem;
    }

    .profile-handle { font-size: 0.8rem; color: var(--muted); margin-bottom: 10px; }
    .profile-bio { font-size: 0.85rem; color: var(--muted); line-height: 1.6; margin-bottom: 14px; min-height: 40px; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .divider { height: 1px; background: var(--border); margin: 14px 0; }

    .stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 4px; text-align: center;
    }

    .stat-item { cursor: pointer; padding: 4px; border-radius: 8px; transition: background 0.2s; }
    .stat-item:hover { background: var(--surface2); }
    .stat-num { font-family: var(--font-display); font-weight: 700; font-size: 1.1rem; }
    .stat-label { font-size: 0.7rem; color: var(--muted); }

    .profile-actions { display: flex; gap: 8px; margin-top: 16px; }

    .btn-action {
      flex: 1; padding: 9px 12px; border-radius: 10px;
      font-size: 0.82rem; font-family: var(--font-body); font-weight: 500;
      cursor: pointer; border: none; transition: all 0.2s; text-align: center;
    }

    .btn-action.primary { background: var(--accent); color: #000; }
    .btn-action.primary:hover { box-shadow: 0 4px 16px rgba(232,255,90,0.2); transform: translateY(-1px); }
    .btn-action.outline { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-action.outline:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .btn-action.danger { background: transparent; color: var(--accent3); border: 1px solid rgba(255,90,138,0.3); }
    .btn-action.danger:hover { background: rgba(255,90,138,0.1); }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      padding: 24px; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }

    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; width: 100%; max-width: 480px;
      max-height: 90vh; overflow-y: auto;
      transform: translateY(20px) scale(0.97); transition: transform 0.25s;
    }

    .modal-overlay.open .modal { transform: translateY(0) scale(1); }

    .modal-header {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }

    .modal-title { font-family: var(--font-display); font-weight: 700; font-size: 1rem; }

    .modal-close {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }

    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 24px; }

    /* LISTA DE SEGUIDORES NO MODAL */
    .user-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: all 0.2s;
    }

    .user-item:last-child { border-bottom: none; }
    .user-item:hover { opacity: 0.8; }

    .user-item-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--surface2); display: flex;
      align-items: center; justify-content: center; font-size: 1rem;
    }

    .user-item-nome { font-family: var(--font-display); font-size: 0.88rem; font-weight: 600; }
    .user-item-handle { font-size: 0.75rem; color: var(--muted); }

    /* CONTEÚDO PRINCIPAL */
    .main-content { display: flex; flex-direction: column; gap: 16px; }

    .post-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .post-input-row { display: flex; gap: 12px; align-items: flex-start; }

    .post-avatar-sm {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--surface2); display: flex;
      align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }

    .post-textarea {
      flex: 1; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 11px 14px; color: var(--text);
      font-family: var(--font-body); font-size: 0.88rem;
      resize: none; outline: none; min-height: 72px;
      transition: border-color 0.2s, min-height 0.3s;
    }

    .post-textarea::placeholder { color: var(--muted); }
    .post-textarea:focus { border-color: var(--accent); min-height: 100px; }

    .post-bottom {
      display: flex; align-items: center;
      justify-content: flex-end; margin-top: 12px; gap: 12px;
    }

    .post-submit {
      padding: 8px 18px; background: var(--accent); color: #000;
      border: none; border-radius: 999px;
      font-family: var(--font-body); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }

    .post-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    .post-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px;
      transition: border-color 0.2s; animation: fadeUp 0.4s ease both;
    }

    .post-card:hover { border-color: rgba(255,255,255,0.1); }
    .post-text { font-size: 0.88rem; line-height: 1.7; color: #d0d0d0; margin-bottom: 14px; white-space: pre-wrap; }

    .post-meta-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.75rem; color: var(--muted);
      padding-top: 12px; border-top: 1px solid var(--border);
    }

    .post-actions { display: flex; gap: 8px; }

    .reaction-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 11px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-size: 0.78rem;
      font-family: var(--font-body); cursor: pointer; transition: all 0.2s;
    }

    .reaction-btn:hover { background: var(--surface2); color: var(--text); }
    .reaction-btn.active { background: rgba(232,255,90,0.08); border-color: rgba(232,255,90,0.3); color: var(--accent); }

    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 0.88rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    @media (max-width: 768px) {
      .page { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-dot"></span>
        Orbita
      </a>
      <div class="nav-actions">
        <a href="feed.html" class="nav-btn">🏠 Feed</a>
        <a href="comunidades.html" class="nav-btn">🌐 Comunidades</a>
        <button class="nav-btn primary" onclick="Orbita.auth.logout()">Sair</button>
      </div>
    </div>
  </nav>

  <div class="page">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="card">
        <div class="profile-cover">
          <div class="cover-pattern"></div>
        </div>
        <div class="profile-body">
          <div class="avatar-wrap">
            <div class="avatar-main" id="perfil-avatar">🙂</div>
            <div class="avatar-status"></div>
          </div>

          <div class="profile-name"   id="perfil-nome">Carregando...</div>
          <div class="profile-handle" id="perfil-handle"></div>
          <div class="profile-bio"    id="perfil-bio"></div>
          <div class="tags"           id="perfil-tags"></div>

          <div class="divider"></div>

          <div class="stats">
            <div class="stat-item" onclick="abrirSeguidores()">
              <div class="stat-num"   id="stat-posts">0</div>
              <div class="stat-label">Posts</div>
            </div>
            <div class="stat-item" onclick="abrirSeguidores()">
              <div class="stat-num"   id="stat-seguidores">0</div>
              <div class="stat-label">Seguidores</div>
            </div>
            <div class="stat-item" onclick="abrirSeguindo()">
              <div class="stat-num"   id="stat-seguindo">0</div>
              <div class="stat-label">Seguindo</div>
            </div>
          </div>

          <!-- Botões mudam conforme é seu perfil ou de outro -->
          <div class="profile-actions" id="profile-actions"></div>
        </div>
      </div>
    </aside>

    <!-- CONTEÚDO -->
    <main class="main-content">

      <!-- Caixa de post — só aparece no próprio perfil -->
      <div class="post-box" id="post-box" style="display:none">
        <div class="post-input-row">
          <div class="post-avatar-sm" id="post-avatar">🙂</div>
          <textarea
            class="post-textarea"
            id="post-input"
            placeholder="O que está acontecendo?"
            maxlength="280"
          ></textarea>
        </div>
        <div class="post-bottom">
          <button class="post-submit" id="btn-publicar" onclick="publicarPost()" disabled>
            Publicar →
          </button>
        </div>
      </div>

      <div id="posts-lista"></div>

    </main>
  </div>


  <!-- MODAL: EDITAR PERFIL -->
  <div class="modal-overlay" id="modal-editar" onclick="fecharModalSeOverlay(event, 'modal-editar')">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">✏️ Editar perfil</div>
        <button class="modal-close" onclick="fecharModal('modal-editar')">✕</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label for="edit-nome">Nome</label>
          <input type="text" id="edit-nome" placeholder="Seu nome"/>
        </div>
        <div class="field">
          <label for="edit-bio">Bio</label>
          <textarea id="edit-bio" placeholder="Fale sobre você..." style="min-height:80px; resize:none"></textarea>
        </div>
        <div class="field">
          <label for="edit-cidade">Cidade</label>
          <input type="text" id="edit-cidade" placeholder="Ex: São Paulo, BR"/>
        </div>
        <div class="field">
          <label for="edit-avatar">Avatar (emoji)</label>
          <input type="text" id="edit-avatar" placeholder="Ex: 🧑‍💻" maxlength="4"/>
        </div>
        <div style="display:flex; gap:10px; margin-top:24px">
          <button class="btn-action outline" style="flex:1" onclick="fecharModal('modal-editar')">Cancelar</button>
          <button class="btn-action primary" style="flex:2" onclick="salvarPerfil()">Salvar →</button>
        </div>
      </div>
    </div>
  </div>


  <!-- MODAL: SEGUIDORES / SEGUINDO -->
  <div class="modal-overlay" id="modal-lista" onclick="fecharModalSeOverlay(event, 'modal-lista')">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-lista-titulo">Seguidores</div>
        <button class="modal-close" onclick="fecharModal('modal-lista')">✕</button>
      </div>
      <div class="modal-body">
        <div id="modal-lista-conteudo"></div>
      </div>
    </div>
  </div>


  <script src="app.js"></script>
  <script>

    // Proteção de rota
    if (!Orbita.auth.estaLogado()) {
      window.location.href = 'login.html';
    }

    const token       = Orbita.store.ler('token');
    const euUsuario   = Orbita.auth.usuario();

    // ==========================================
    // Descobre qual perfil mostrar
    // Se a URL tiver ?usuario=handle, mostra aquele perfil
    // Se não, mostra o perfil do usuário logado
    // ==========================================
    const params       = new URLSearchParams(window.location.search);
    const handleAlvo   = params.get('usuario') || euUsuario?.handle;
    const ehMeuPerfil  = handleAlvo === euUsuario?.handle;

    let perfilAtual = null;


    // ==========================================
    // FUNÇÃO: carregarPerfil()
    // ==========================================
    async function carregarPerfil() {
      try {
        const resposta = await fetch(`${API_URL}/api/usuarios/${handleAlvo}`, {
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
        });

        const dados = await resposta.json();
        if (!resposta.ok) throw new Error(dados.erro);

        perfilAtual = dados.usuario;
        renderizarPerfil(perfilAtual);
        carregarPosts(handleAlvo);

      } catch (e) {
        Orbita.toast('Erro ao carregar perfil', 'error');
      }
    }


    // ==========================================
    // FUNÇÃO: renderizarPerfil(u)
    // ==========================================
    function renderizarPerfil(u) {
      document.getElementById('perfil-avatar').textContent  = u.avatar  || '🙂';
      document.getElementById('perfil-nome').textContent    = u.nome;
      document.getElementById('perfil-handle').textContent  = `@${u.handle}${u.cidade ? ' · ' + u.cidade : ''}`;
      document.getElementById('perfil-bio').textContent     = u.bio || 'Sem bio ainda.';
      document.getElementById('stat-seguidores').textContent = u.total_seguidores || 0;
      document.getElementById('stat-seguindo').textContent   = u.total_seguindo   || 0;

      document.title = `Orbita — ${u.nome}`;

      // Botões diferentes conforme o perfil
      const actions = document.getElementById('profile-actions');

      if (ehMeuPerfil) {
        // Meu perfil — botão de editar
        document.getElementById('post-box').style.display  = 'block';
        document.getElementById('post-avatar').textContent = u.avatar || '🙂';

        actions.innerHTML = `
          <button class="btn-action primary" onclick="abrirModalEditar()">✏️ Editar</button>
          <button class="btn-action outline" onclick="Orbita.auth.logout()">Sair</button>
        `;
      } else {
        // Perfil de outro usuário — botão de seguir
        const seguindo = u.estouSeguindo;
        actions.innerHTML = `
          <button
            class="btn-action ${seguindo ? 'danger' : 'primary'}"
            id="btn-seguir"
            onclick="toggleSeguir(${u.id})">
            ${seguindo ? '✓ Seguindo' : '+ Seguir'}
          </button>
          <button class="btn-action outline" onclick="window.location.href='mensagens.html?conversa=${u.id}&nome=${u.nome}&handle=${u.handle}&avatar=${u.avatar || '🙂'}'">
          💬 Mensagem
          </button>
        `;
      }
    }


    // ==========================================
    // FUNÇÃO: toggleSeguir(id)
    // ==========================================
    async function toggleSeguir(id) {
      const btn = document.getElementById('btn-seguir');
      btn.disabled = true;

      try {
        const resposta = await fetch(`${API_URL}/api/usuarios/${id}/seguir`, {
          method:  'POST',
          headers: { 'Authorization': `Bearer ${token}` },
        });

        const dados = await resposta.json();
        if (!resposta.ok) {
          Orbita.toast(dados.erro || 'Erro', 'error');
          return;
        }

        // Atualiza o botão
        btn.textContent = dados.seguindo ? '✓ Seguindo' : '+ Seguir';
        btn.className   = `btn-action ${dados.seguindo ? 'danger' : 'primary'}`;

        // Atualiza o contador
        document.getElementById('stat-seguidores').textContent = dados.totalSeguidores;

        Orbita.toast(dados.seguindo ? 'Seguindo! 🎉' : 'Deixou de seguir', 'default');

      } catch (e) {
        Orbita.toast('Erro ao conectar', 'error');
      } finally {
        btn.disabled = false;
      }
    }


    // ==========================================
    // FUNÇÃO: carregarPosts(handle)
    // ==========================================
    async function carregarPosts(handle) {
      const lista = document.getElementById('posts-lista');

      lista.innerHTML = `
        <div class="post-card">
          <div class="skeleton-line"></div>
          <div class="skeleton-line" style="width:70%;margin-bottom:0"></div>
        </div>
      `;

      try {
        const resposta = await fetch(`${API_URL}/api/usuarios/${handle}/posts`);
        const dados    = await resposta.json();

        if (!resposta.ok) throw new Error();

        document.getElementById('stat-posts').textContent = dados.total;

        if (dados.posts.length === 0) {
          lista.innerHTML = `
            <div class="empty-state">
              <div style="font-size:2rem; margin-bottom:12px">📝</div>
              <p>${ehMeuPerfil ? 'Você ainda não publicou nada.' : 'Nenhum post ainda.'}</p>
            </div>
          `;
          return;
        }

        lista.innerHTML = '';
        dados.posts.forEach((post, i) => {
          const tempo = Orbita.format.tempo(new Date(post.criado_em));
          lista.insertAdjacentHTML('beforeend', `
            <div class="post-card" id="card-${post.id}" style="animation-delay:${i * 0.07}s">
              <div class="post-text">${post.texto}</div>
              <div class="post-meta-row">
                <span>${tempo}</span>
                <div class="post-actions">
                  <button class="reaction-btn" onclick="curtirPost(${post.id})">
                    ✦ <span id="count-${post.id}">${post.curtidas}</span>
                  </button>
                  ${ehMeuPerfil ? `
                    <button class="reaction-btn" onclick="deletarPost(${post.id})">
                      🗑️ Deletar
                    </button>
                  ` : ''}
                </div>
              </div>
            </div>
          `);
        });

      } catch (e) {
        lista.innerHTML = `<div class="empty-state">Erro ao carregar posts.</div>`;
      }
    }


    // ==========================================
    // FUNÇÃO: publicarPost()
    // ==========================================
    async function publicarPost() {
      const input = document.getElementById('post-input');
      const texto = input.value.trim();
      const btn   = document.getElementById('btn-publicar');

      if (!texto) return;

      btn.disabled    = true;
      btn.textContent = 'Publicando...';

      try {
        const resposta = await fetch(`${API_URL}/api/posts`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body:    JSON.stringify({ texto }),
        });

        const dados = await resposta.json();
        if (!resposta.ok) { Orbita.toast(dados.erro || 'Erro', 'error'); return; }

        input.value = '';
        Orbita.toast('Post publicado! ✦', 'success');
        carregarPosts(handleAlvo);

      } catch (e) {
        Orbita.toast('Erro ao conectar', 'error');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Publicar →';
        btn.disabled    = true;
      }
    }


    // ==========================================
    // FUNÇÃO: curtirPost(id)
    // ==========================================
    async function curtirPost(id) {
      try {
        const resposta = await fetch(`${API_URL}/api/posts/${id}/curtir`, {
          method:  'POST',
          headers: { 'Authorization': `Bearer ${token}` },
        });
        const dados = await resposta.json();
        if (!resposta.ok) return;
        const count = document.getElementById('count-' + id);
        if (count) count.textContent = dados.curtidas;
      } catch (e) {}
    }


    // ==========================================
    // FUNÇÃO: deletarPost(id)
    // ==========================================
    async function deletarPost(id) {
      if (!confirm('Deletar esse post?')) return;

      try {
        const resposta = await fetch(`${API_URL}/api/posts/${id}`, {
          method:  'DELETE',
          headers: { 'Authorization': `Bearer ${token}` },
        });

        if (!resposta.ok) { Orbita.toast('Erro ao deletar', 'error'); return; }

        const card = document.getElementById('card-' + id);
        card.style.opacity = '0'; card.style.transform = 'translateY(-8px)';
        card.style.transition = 'all 0.3s ease';
        setTimeout(() => {
          card.remove();
          const el = document.getElementById('stat-posts');
          el.textContent = Math.max(0, parseInt(el.textContent) - 1);
        }, 300);

        Orbita.toast('Post deletado', 'default');
      } catch (e) {}
    }


    // ==========================================
    // EDITAR PERFIL
    // ==========================================
    function abrirModalEditar() {
      if (!perfilAtual) return;
      document.getElementById('edit-nome').value   = perfilAtual.nome   || '';
      document.getElementById('edit-bio').value    = perfilAtual.bio    || '';
      document.getElementById('edit-cidade').value = perfilAtual.cidade || '';
      document.getElementById('edit-avatar').value = perfilAtual.avatar || '';
      document.getElementById('modal-editar').classList.add('open');
    }

    async function salvarPerfil() {
      const nome   = document.getElementById('edit-nome').value.trim();
      const bio    = document.getElementById('edit-bio').value.trim();
      const cidade = document.getElementById('edit-cidade').value.trim();
      const avatar = document.getElementById('edit-avatar').value.trim();

      try {
        const resposta = await fetch(`${API_URL}/api/usuarios/perfil`, {
          method:  'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body:    JSON.stringify({ nome, bio, cidade, avatar }),
        });

        const dados = await resposta.json();
        if (!resposta.ok) { Orbita.toast(dados.erro || 'Erro', 'error'); return; }

        perfilAtual = { ...perfilAtual, nome, bio, cidade, avatar };
        Orbita.store.salvar('usuario', { ...euUsuario, nome, avatar });
        renderizarPerfil(perfilAtual);
        fecharModal('modal-editar');
        Orbita.toast('Perfil atualizado! ✦', 'success');

      } catch (e) {
        Orbita.toast('Erro ao conectar', 'error');
      }
    }


    // ==========================================
    // SEGUIDORES / SEGUINDO
    // ==========================================
    async function abrirSeguidores() {
      document.getElementById('modal-lista-titulo').textContent = 'Seguidores';
      document.getElementById('modal-lista').classList.add('open');

      const conteudo = document.getElementById('modal-lista-conteudo');
      conteudo.innerHTML = '<div class="skeleton-line"></div>';

      try {
        const resposta = await fetch(`${API_URL}/api/usuarios/${handleAlvo}/seguidores`);
        const dados    = await resposta.json();

        if (dados.seguidores.length === 0) {
          conteudo.innerHTML = '<p style="color:var(--muted); font-size:0.85rem; text-align:center; padding:20px">Nenhum seguidor ainda.</p>';
          return;
        }

        conteudo.innerHTML = dados.seguidores.map(u => `
          <div class="user-item" onclick="irParaPerfil('${u.handle}')">
            <div class="user-item-avatar">${u.avatar || '🙂'}</div>
            <div>
              <div class="user-item-nome">${u.nome}</div>
              <div class="user-item-handle">@${u.handle}</div>
            </div>
          </div>
        `).join('');

      } catch (e) {
        conteudo.innerHTML = '<p style="color:var(--muted)">Erro ao carregar.</p>';
      }
    }

    async function abrirSeguindo() {
      document.getElementById('modal-lista-titulo').textContent = 'Seguindo';
      document.getElementById('modal-lista').classList.add('open');

      const conteudo = document.getElementById('modal-lista-conteudo');
      conteudo.innerHTML = '<div class="skeleton-line"></div>';

      try {
        const resposta = await fetch(`${API_URL}/api/usuarios/${handleAlvo}/seguindo`);
        const dados    = await resposta.json();

        if (dados.seguindo.length === 0) {
          conteudo.innerHTML = '<p style="color:var(--muted); font-size:0.85rem; text-align:center; padding:20px">Não segue ninguém ainda.</p>';
          return;
        }

        conteudo.innerHTML = dados.seguindo.map(u => `
          <div class="user-item" onclick="irParaPerfil('${u.handle}')">
            <div class="user-item-avatar">${u.avatar || '🙂'}</div>
            <div>
              <div class="user-item-nome">${u.nome}</div>
              <div class="user-item-handle">@${u.handle}</div>
            </div>
          </div>
        `).join('');

      } catch (e) {
        conteudo.innerHTML = '<p style="color:var(--muted)">Erro ao carregar.</p>';
      }
    }

    // Navega para o perfil de outro usuário
    function irParaPerfil(handle) {
      window.location.href = `perfil.html?usuario=${handle}`;
    }

    function fecharModal(id) {
      document.getElementById(id).classList.remove('open');
    }

    function fecharModalSeOverlay(e, id) {
      if (e.target.classList.contains('modal-overlay')) fecharModal(id);
    }

    // Habilita botão de publicar ao digitar
    document.getElementById('post-input').addEventListener('input', function() {
      document.getElementById('btn-publicar').disabled = this.value.trim().length === 0;
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        fecharModal('modal-editar');
        fecharModal('modal-lista');
      }
    });

    // Carrega o perfil
    carregarPerfil();

  </script>
</body>
</html>
